<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020617;color:#f8fafc;font-family:monospace;padding:16px;font-size:13px}
h1{color:#06b6d4;font-size:13px;letter-spacing:3px;margin-bottom:10px}
#top{display:flex;gap:8px;margin-bottom:8px}
#inp{flex:1;background:#0f172a;border:1px solid #334155;color:#f8fafc;padding:8px;border-radius:4px;font-size:12px;font-family:monospace}
button{background:#06b6d4;color:#020617;border:none;padding:8px 14px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px}
#st{font-size:10px;color:#475569;margin-bottom:10px}
.tok{background:#0f172a;border:1px solid #1e293b;border-radius:6px;padding:9px 12px;display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap}
.tok.buy{border-color:#10b981;background:#011a12;animation:blink 1.2s infinite}
.tok.sell{border-color:#ef4444;background:#1a0209;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
.sym{font-weight:bold;min-width:60px;color:#e2e8f0}
.px{color:#94a3b8;min-width:90px}
.rb{font-weight:bold;font-size:15px;min-width:80px}
.rb.buy{color:#10b981}.rb.sell{color:#ef4444}.rb.n{color:#475569}
.sig{font-size:10px;padding:2px 8px;border-radius:3px;font-weight:bold;margin-left:auto}
.sig.buy{background:#011a12;color:#10b981;border:1px solid #10b981}
.sig.sell{background:#1a0209;color:#ef4444;border:1px solid #ef4444}
.sig.n{color:#334155}
.del{background:none;border:none;color:#334155;cursor:pointer;font-size:14px;margin-left:6px}
.del:hover{color:#ef4444}
</style>
</head>
<body>
<h1>⚡ SOLANA RSI EXTREME SCANNER</h1>
<div id="top">
  <input id="inp" placeholder="Pegar dirección SPL token..."/>
  <button onclick="addTok()">+ ADD</button>
  <button id="sb" onclick="toggleSound()" style="background:#0f172a;color:#06b6d4;border:1px solid #1e293b">🔔</button>
</div>
<div id="st">Iniciando...</div>
<div id="list"></div>

<script>
const DEFS=[
  {addr:'So11111111111111111111111111111111111111112',sym:'SOL'},
  {addr:'JUPyiwrYJGtr5i9m9uYg8F6gfgZ29AdUGRKLDxSpzSj',sym:'JUP'},
  {addr:'EKpQGSJtjMFqKZ9KQajSqgRSvGgndwe8YovB5st6ZKB',sym:'WIF'},
  {addr:'DezXAZ8z7RnrH8pA5YnpxE7SjG3A1V1m75D1u4zo6V2',sym:'BONK'},
  {addr:'4k3146Nz6ADve274Wkwks6T32C3A8HFR2425mU6jG15a',sym:'RAY'},
];
let soundOn=true;
let toks=DEFS.map(d=>({...d,price:0,rsi:null,buf:[],st:'n'}));

function calcRSI(p){
  if(p.length<15)return null;
  let ch=p.slice(1).map((v,i)=>v-p[i]);
  let g=0,l=0;
  for(let i=0;i<14;i++){ch[i]>0?g+=ch[i]:l+=Math.abs(ch[i]);}
  let ag=g/14,al=l/14;
  for(let i=14;i<ch.length;i++){ag=(ag*13+Math.max(0,ch[i]))/14;al=(al*13+Math.max(0,-ch[i]))/14;}
  if(al===0)return 100;
  return Math.round((100-100/(1+ag/al))*10)/10;
}

function beep(type){
  if(!soundOn)return;
  try{
    let ac=new(window.AudioContext||window.webkitAudioContext)();
    let o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type==='buy'?'sine':'triangle';
    o.frequency.setValueAtTime(type==='buy'?520:780,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(type==='buy'?1040:390,ac.currentTime+0.35);
    g.gain.setValueAtTime(0.12,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01,ac.currentTime+0.35);
    o.start();o.stop(ac.currentTime+0.37);
  }catch(e){}
}

async function fetchTok(t){
  try{
    let r=await fetch(`https://api.dexscreener.com/latest/dex/tokens/${t.addr}`);
    let d=await r.json();
    let pairs=(d.pairs||[]).filter(p=>p.chainId==='solana');
    if(!pairs.length)return t;
    let pair=pairs.reduce((m,c)=>(c.liquidity?.usd||0)>(m.liquidity?.usd||0)?c:m,pairs[0]);
    let price=parseFloat(pair.priceUsd||0);
    let buf=[...(t.buf||[]),price];
    if(buf.length>150)buf.shift();
    let rsi=calcRSI(buf);
    let prev=t.st;
    let st=rsi===null?'n':rsi<=20?'buy':rsi>=80?'sell':'n';
    if(st!==prev&&st!=='n')beep(st);
    return{...t,sym:pair.baseToken?.symbol||t.sym,price,buf,rsi,st};
  }catch(e){return t;}
}

async function scan(){
  document.getElementById('st').textContent=`🔄 Escaneando ${toks.length} tokens... ${new Date().toLocaleTimeString()}`;
  toks=await Promise.all(toks.map(fetchTok));
  render();
  document.getElementById('st').textContent=`✅ ${new Date().toLocaleTimeString()} | próximo en 12s`;
}

function render(){
  document.getElementById('list').innerHTML=toks.map((t,i)=>{
    let px=t.price<0.01?t.price.toFixed(6):t.price.toFixed(3);
    let rc=t.st==='buy'?'buy':t.st==='sell'?'sell':'n';
    let sig=t.st==='buy'?'🟢 RSI EXTREMO COMPRA':t.st==='sell'?'🔴 RSI EXTREMO VENTA':'—';
    return`<div class="tok ${t.st}">
      <span class="sym">${t.sym}</span>
      <span class="px">$${px}</span>
      <span class="rb ${rc}">RSI ${t.rsi!==null?t.rsi:'...'}</span>
      <span class="sig ${rc}">${sig}</span>
      <button class="del" onclick="del(${i})">✕</button>
    </div>`;
  }).join('');
}

async function addTok(){
  let addr=document.getElementById('inp').value.trim();
  if(addr.length<32){alert('Dirección inválida');return;}
  if(toks.some(t=>t.addr===addr)){alert('Ya existe');return;}
  if(toks.length>=20){alert('Máximo 20');return;}
  toks.push({addr,sym:'...',price:0,rsi:null,buf:[],st:'n'});
  document.getElementById('inp').value='';
  await scan();
}

function del(i){toks.splice(i,1);render();}

function toggleSound(){
  soundOn=!soundOn;
  document.getElementById('sb').textContent=soundOn?'🔔':'🔕';
}

scan();
setInterval(scan,12000);
</script>
</body>
</html>
