  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- ALGORITHMIQUE & COMPUTATIONAL UTILS ---

    // standard Welles Wilder RSI(14)
    function calculateRSI(candles, period = 14) {
      if (!candles || candles.length <= period) return 50.0;
      
      const sorted = [...candles].sort((a, b) => a.time - b.time);
      const gains = [];
      const losses = [];

      for (let i = 1; i < sorted.length; i++) {
        const diff = sorted[i].close - sorted[i - 1].close;
        if (diff > 0) {
          gains.push(diff);
          losses.push(0);
        } else {
          gains.push(0);
          losses.push(-diff);
        }
      }

      let avgGain = 0;
      let avgLoss = 0;

      for (let i = 0; i < Math.min(period, gains.length); i++) {
        avgGain += gains[i];
        avgLoss += losses[i];
      }

      avgGain /= period;
      avgLoss /= period;

      for (let i = period; i < gains.length; i++) {
        avgGain = (avgGain * (period - 1) + gains[i]) / period;
        avgLoss = (avgLoss * (period - 1) + losses[i]) / period;
      }

      if (avgLoss === 0) {
        return avgGain === 0 ? 50.0 : 100.0;
      }

      const rs = avgGain / avgLoss;
      const computed = 100 - (100 / (1 + rs));
      return isNaN(computed) ? 50.0 : Math.round(computed * 10) / 10;
    }

    // Identifies 5-bar structural fractals high/low points
    function identifyFractals(candles) {
      const highs = [];
      const lows = [];
      const n = 2; // Needs 2 bars left and 2 bars right
      const sorted = [...candles].sort((a, b) => a.time - b.time);

      for (let i = n; i < sorted.length - n; i++) {
        let isHigh = true;
        let isLow = true;

        for (let j = -n; j <= n; j++) {
          if (j === 0) continue;
          if (sorted[i].high < sorted[i + j].high) isHigh = false;
          if (sorted[i].low > sorted[i + j].low) isLow = false;
        }

        if (isHigh) {
          highs.push({ price: sorted[i].high, time: sorted[i].time });
        }
        if (isLow) {
          lows.push({ price: sorted[i].low, time: sorted[i].time });
        }
      }

      return { highs, lows };
    }

    // Determine trend based on support-resistance peak values
    function determineTrend(highs, lows) {
      if (highs.length < 2 || lows.length < 2) return 'LATERAL';

      const lastH = highs[highs.length - 1].price;
      const prevH = highs[highs.length - 2].price;
      const lastL = lows[lows.length - 1].price;
      const prevL = lows[lows.length - 2].price;

      if (lastH > prevH && lastL > prevL) return 'BULLISH';
      if (lastH < prevH && lastL < prevL) return 'BEARISH';
      return 'LATERAL';
    }

    // Roll over and compile real candle series matched in real time
    function updateCandleSeries(candles, newPrice, timeframeSecs) {
      if (!candles || candles.length === 0) {
        return [{ time: Math.floor(Date.now() / 1000), open: newPrice, high: newPrice, low: newPrice, close: newPrice }];
      }
      const series = [...candles];
      const last = { ...series[series.length - 1] };
      const now = Math.floor(Date.now() / 1000);

      if (now - last.time >= timeframeSecs) {
        series.push({
          time: last.time + timeframeSecs,
          open: last.close,
          high: newPrice,
          low: newPrice,
          close: newPrice
        });
        if (series.length > 100) {
          series.shift();
        }
      } else {
        last.close = newPrice;
        if (newPrice > last.high) last.high = newPrice;
        if (newPrice < last.low) last.low = newPrice;
        series[series.length - 1] = last;
      }
      return series;
    }

    // Back populate custom visual candles walk (timeframes)
    function generateInitialCandles(basePrice, granularitySeconds, count = 100) {
      const candles = [];
      const nowEpoch = Math.floor(Date.now() / 1000);

      for (let i = 0; i < count; i++) {
        const time = nowEpoch - i * granularitySeconds;
        candles.unshift({
          time,
          open: basePrice,
          high: basePrice,
          low: basePrice,
          close: basePrice,
        });
      }

      return candles;
    }

    // Extract Solana mint address tokens via regex filter
    function parseAndExtractAddresses(text) {
      const solregex = /[1-9A-HJ-NP-Za-km-z]{32,44}/g;
      const matches = text.match(solregex) || [];
      const unique = Array.from(new Set(matches));
      return unique.filter(addr => {
        const isHeaderField = /^(Type|List|Color|Address|Chain|Watchlist|Name|Id|solana)$/i.test(addr);
        return !isHeaderField && addr.length >= 32;
      });
    }

    // --- DEXSCREENER CLIENT CONNECTION ASSISTANT ---
    async function fetchTokenFromDexscreener(query) {
      const cleanQuery = query.trim();
      if (!cleanQuery) return null;

      const urlsToTry = [];
      if (cleanQuery.length > 25) {
        urlsToTry.push(`https://api.dexscreener.com/latest/dex/tokens/${cleanQuery}`);
        urlsToTry.push(`https://api.dexscreener.com/latest/dex/search?q=${cleanQuery}`);
        urlsToTry.push(`https://api.dexscreener.com/latest/dex/pairs/solana/${cleanQuery}`);
      } else {
        urlsToTry.push(`https://api.dexscreener.com/latest/dex/search?q=${cleanQuery}`);
        urlsToTry.push(`https://api.dexscreener.com/latest/dex/tokens/${cleanQuery}`);
      }

      for (const url of urlsToTry) {
        try {
          const res = await fetch(url);
          if (!res.ok) continue;

          const data = await res.json();
          const pairs = data.pairs || data.pair || (data.pair ? [data.pair] : null);

          if (!pairs || (Array.isArray(pairs) && pairs.length === 0)) {
            continue;
          }

          const rawPairs = Array.isArray(pairs) ? pairs : [pairs];

          // Sort on highest liquidity to isolate best pair representation
          const sortedPairs = [...rawPairs].sort((a, b) => {
            const liqA = a.liquidity?.usd || 0;
            const liqB = b.liquidity?.usd || 0;
            return liqB - liqA;
          });

          const bestPair = sortedPairs[0];
          if (bestPair && bestPair.baseToken) {
            return {
              address: bestPair.baseToken.address,
              symbol: bestPair.baseToken.symbol,
              name: bestPair.baseToken.name,
              price: parseFloat(bestPair.priceUsd) || 0,
              change24h: bestPair.priceChange?.h24 || 0,
              volume24h: bestPair.volume?.h24 || 0,
              liquidity: bestPair.liquidity?.usd || 0,
            };
          }
        } catch (err) {
          console.warn(`Endpoint connect failed: ${url}`, err);
        }
      }
      return null;
    }

    // Smart adaptive Lucide rendering icon
    function Icon({ name, className = 'w-4 h-4' }) {

    // Watchlist token card
    function TokenCard({ token, isActive, onSelect, onDelete }) {
      const isPriceUp = token.prevPrice ? token.price > token.prevPrice : token.change24h >= 0;

      const formatPrice = (price) => {
        if (price === 0) return '0.00';
        if (price < 0.0001) return price.toFixed(8);
        if (price < 0.1) return price.toFixed(6);
        if (price < 10) return price.toFixed(4);
        return price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

      const getStatusBadge = () => {

      const getScoreBadgeClass = () => {

      return (

              <button
                onClick={(e) => {
                  e.stopPropagation();
                  onDelete(token.address);

          </div>

          <div className="flex items-center justify-between text-[11px] mt-3 pt-2.5 border-t border-[#1e293b]/70 relative z-10 font-mono">

              token.trend === 'BULLISH' ? 'text-cyber-green' : token.trend === 'BEARISH' ? 'text-cyber-red' : 'text-slate-500'
            }`}>
              {token.trend === 'BULLISH' ? '▲ ALCISTA' : token.trend === 'BEARISH' ? '▼ BAJISTA' : '◆ RANGO'}
            </span>
            {getStatusBadge()}
          </div>
        </div>
      );
    }

    // Unlimited Solana Contract Indexer
    function StandaloneIndexer({ onAddToken, onAddMultipleTokens, tokenCount, onClearWatchlist }) {
      const [activeTab, setActiveTab] = useState('single');
      const [singleValue, setSingleValue] = useState('');
      const [csvValue, setCsvValue] = useState('');
      const [dragActive, setDragActive] = useState(false);
      const [statusMsg, setStatusMsg] = useState('');
      const [isLoading, setIsLoading] = useState(false);
      const fileInputRef = useRef(null);

      const quickSuggestions = [
        { name: 'WIF', addr: 'EKpQGSJtjMFqKZ9m2E7ekMainMc2tsy676A9A87SuSUX' },
        { name: 'POPCAT', addr: '7GCih69g7FfX9Y677AAVXg6CcWjuyaiU4Pg7yXARf3u3' },
        { name: 'BONK', addr: 'DezXAZ8z7PnrnRJjz3wX4mGCmzNgR6937JoxCwt6A85' },
        { name: 'SOL', addr: 'So11111111111111111111111111111111111111112' }
      ];

      const handleAddSingle = async (e) => {
        if(e) e.preventDefault();
        setStatusMsg('');
        const trimmed = singleValue.trim();
        if (!trimmed) return;

        setIsLoading(true);
        try {
          const success = await onAddToken(trimmed);
          setSingleValue('');
          setIsLoading(false);
          if (success) {
            setStatusMsg('¡Módulo de indexación cargada con éxito!');
          } else {
            setStatusMsg('Error: El token no existe o no hay datos reales en DexScreener.');
          }
        } catch (err) {
          setIsLoading(false);
          setStatusMsg('Error: Fallo al comunicarse con el oráculo de datos.');
        }
      };

      const handleBatchImport = () => {
        setStatusMsg('');
        const cleaned = csvValue.trim();
        if (!cleaned) {
          setStatusMsg('El campo CSV está vacío.');
          return;
        }

        const parsedAddresses = parseAndExtractAddresses(cleaned);
        if (parsedAddresses.length === 0) {
          setStatusMsg('No se detectaron direcciones de contrato Solana.');
          return;
        }

        setIsLoading(true);
        setTimeout(() => {
          onAddMultipleTokens(parsedAddresses);
          setCsvValue('');
          setIsLoading(false);
          setStatusMsg(`¡Cargados con éxito ${parsedAddresses.length} tokens descritos!`);
        }, 500);
      };

      const handleDrag = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (e.type === "dragenter" || e.type === "dragover") {
          setDragActive(true);
        } else if (e.type === "dragleave") {
          setDragActive(false);
        }
      };

      const handleDrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        setDragActive(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          readFile(e.dataTransfer.files[0]);
        }
      };

      const handleFileChange = (e) => {
        if (e.target.files && e.target.files[0]) {
          readFile(e.target.files[0]);
        }
      };

      const readFile = (file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const text = e.target.result;
          if (text) {
            setCsvValue(text);
            const count = parseAndExtractAddresses(text).length;
            setStatusMsg(`Archivo "${file.name}" leído (${count} direcciones encontradas).`);
          }
        };
        reader.readAsText(file);
      };

      return (
        <div className="bg-navy-card rounded-xl border border-navy-border p-4 relative overflow-hidden flex flex-col gap-3">
          <div className="flex items-center justify-between pb-1 select-none">
            <h3 className="font-mono text-xs font-bold uppercase text-slate-200 flex items-center gap-1.5">
              <Icon name="sparkles" className="w-4 h-4 text-gold-corp" />
              Indexador Watchlist ilimitado
            </h3>
            <span className="font-mono text-[9px] bg-gold-dim text-gold-bright px-2 py-0.5 rounded border border-gold-corp/20 leading-none">
              {tokenCount} Indexados
            </span>
          </div>

          <div className="flex bg-navy-dark p-1 rounded-lg border border-[#1e293b]/70 select-none">
            <button
              onClick={() => { setActiveTab('single'); setStatusMsg(''); }}
              className={`flex-1 py-1.5 text-[10px] font-mono rounded font-bold transition-all cursor-pointer ${
                activeTab === 'single' ? 'bg-gold-corp text-navy-dark font-black' : 'text-slate-400 hover:text-slate-250'
              }`}
            >
              Individual (+)
            </button>
            <button
              onClick={() => { setActiveTab('csv'); setStatusMsg(''); }}
              className={`flex-1 py-1.5 text-[10px] font-mono rounded font-bold transition-all cursor-pointer ${
                activeTab === 'csv' ? 'bg-gold-corp text-navy-dark font-black' : 'text-slate-400 hover:text-slate-250'
              }`}
            >
              Cargar CSV / TXT 📁
            </button>
          </div>

          {activeTab === 'single' ? (
            <div className="flex flex-col gap-3">
              <form onSubmit={handleAddSingle} className="flex gap-2">
                <div className="relative flex-1">
                  <input
                    type="text"
                    value={singleValue}
                    onChange={(e) => setSingleValue(e.target.value)}
                    placeholder="Escribe el CA / Dirección del token..."
                    className="w-full bg-navy-dark border border-navy-border focus:border-gold-corp outline-none rounded-lg py-2 pl-8 pr-3 text-xs text-slate-200 placeholder-slate-500 font-mono"
                  />
                  <div className="absolute left-2.5 top-2.5 text-slate-500">
                    <Icon name="search" className="w-3.5 h-3.5" />
                  </div>
                </div>
                <button
                  type="submit"
                  disabled={isLoading || !singleValue.trim()}
                  className="px-3 bg-gold-corp hover:bg-gold-bright text-navy-dark font-mono text-xs font-black rounded-lg transition-all flex items-center gap-1 cursor-pointer disabled:opacity-40 shrink-0"
                >
                  {isLoading ? <Icon name="loader-2" className="w-3.5 h-3.5 animate-spin" /> : 'Indexar'}
                </button>
              </form>

              <div className="flex flex-wrap items-center gap-1.5 select-none border-t border-navy-border/40 pt-2.5">
                <span className="text-[9px] text-slate-500 font-mono font-bold">Rápidos:</span>
                {quickSuggestions.map(s => (
                  <button
                    key={s.name}
                    onClick={() => setSingleValue(s.addr)}
                    className="text-[9px] font-mono px-2 py-0.5 rounded bg-navy-dark hover:bg-navy-light border border-[#1e293b]/60 text-slate-300 hover:text-[#f4d068] transition cursor-pointer"
                  >
                    {s.name}
                  </button>
                ))}
              </div>
            </div>
          ) : (
            <div className="flex flex-col gap-2.5">
              <div
                onDragEnter={handleDrag}
                onDragOver={handleDrag}
                onDragLeave={handleDrag}
                onDrop={handleDrop}
                onClick={() => fileInputRef.current.click()}
                className={`cursor-pointer border border-dashed rounded-lg p-3 text-center flex flex-col items-center justify-center transition bg-navy-dark/40 ${
                  dragActive ? 'border-gold-corp bg-gold-dim' : 'border-[#1e293b] hover:border-gold-corp/50'
                }`}
              >

                  ref={fileInputRef}
                  type="file"
                  accept=".csv,.txt"
                  className="hidden"
                  onChange={handleFileChange}

      // Concentric Rsi Bubble Radar using D3 Force Engine simulation
      function StandaloneRsiBubbleRadar({ tokens, activeAddress, onSelectToken, rsiTimeframe }) {
        const containerRef = useRef(null);
        const [dimensions, setDimensions] = useState({ width: 280, height: 260 });
        const [tick, setTick] = useState(0);

        const nodesRef = useRef([]);
        const simRef = useRef(null);

        // Mathematical deterministic scatter helper replacing Math.random()
        const getDeterministicScatter = (symbol, seed) => {
          let code = 0;
          for (let i = 0; i < symbol.length; i++) {
            code += symbol.charCodeAt(i);
          }
          return (((code * seed) % 100) / 100) - 0.5;
        };

      useEffect(() => {
        if (!containerRef.current) return;
        const observer = new ResizeObserver((entries) => {
          if (!entries || entries.length === 0) return;
          const { width, height } = entries[0].contentRect;
          setDimensions({
            width: width || 280,
            height: height || 260,
          });
        });
        observer.observe(containerRef.current);
        return () => observer.disconnect();
      }, []);

      const sortedByRsiDev = useMemo(() => {
        return [...tokens].sort((a, b) => {
          const devA = Math.abs((a.rsi || 50) - 50);
          const devB = Math.abs((b.rsi || 50) - 50);
          return devB - devA;
        });
      }, [tokens]);

      const top6Tokens = useMemo(() => sortedByRsiDev.slice(0, 6), [sortedByRsiDev]);
      const activeTokenObj = useMemo(() => tokens.find((t) => t.address === activeAddress), [tokens, activeAddress]);
      const isActiveIncluded = useMemo(() => top6Tokens.some((t) => t.address === activeAddress), [top6Tokens, activeAddress]);
      
      const radarTokens = useMemo(() => {
        return isActiveIncluded || !activeTokenObj
          ? top6Tokens
          : [...top6Tokens, activeTokenObj];
      }, [top6Tokens, isActiveIncluded, activeTokenObj]);

      useEffect(() => {
        const currentNodes = nodesRef.current;
        const nodeMap = new Map(currentNodes.map((n) => [n.address, n]));
        const { width, height } = dimensions;

        let maxDev = 0;
        let maxDevAddr = '';
        radarTokens.forEach((t) => {
          const dev = Math.abs((t.rsi || 50) - 50);
          if (dev > maxDev) {
            maxDev = dev;
            maxDevAddr = t.address;
          }
        });

        const nextNodes = radarTokens.map((t, idx) => {
          const baseRsi = Math.max(1, Math.min(100, Math.round(t.rsi || 50)));
          const dev = Math.abs(baseRsi - 50);

          let r = 10;
          if (dev > 4) {
            r = 14 + (Math.min(50, dev) / 50) * 32;
          }

          const existing = nodeMap.get(t.address);
          const isMostExtreme = t.address === maxDevAddr && dev > 4;

          const node = {
            address: t.address,
            symbol: t.symbol,
            rsi: baseRsi,
            r,
            score: t.score,
            isActive: t.address === activeAddress,
            isMostExtreme,
            x: existing ? existing.x : width / 2 + getDeterministicScatter(t.symbol, 7) * 50,
            y: existing ? existing.y : height / 2 + getDeterministicScatter(t.symbol, 13) * 50,
            vx: existing ? existing.vx : 0,
            vy: existing ? existing.vy : 0,
          };

          if (isMostExtreme) {
            node.targetX = width / 2;
            node.targetY = height / 2;
          } else if (dev <= 5) {
            node.targetX = width / 2 + getDeterministicScatter(t.symbol, 3) * 15;
            node.targetY = height / 2 + getDeterministicScatter(t.symbol, 5) * 15;
          } else {
            const hash = t.symbol.charCodeAt(0) + (t.symbol.charCodeAt(1) || 0) + idx;
            const angle = (hash % 12) * (Math.PI / 6);
            const maxRadius = Math.min(width, height) * 0.43;
            const distance = 30 + (dev / 50) * (maxRadius - 30);

            node.targetX = width / 2 + Math.cos(angle) * distance;
            node.targetY = width / 2 < height / 2 
              ? (height / 2 + Math.sin(angle) * distance) 
              : (height / 2 + Math.sin(angle) * distance * 0.85);
          }

          return node;
        });

        nodesRef.current = nextNodes;

        if (!simRef.current) {
          simRef.current = d3
            .forceSimulation(nextNodes)
            .force('x', d3.forceX((d) => d.targetX ?? width / 2).strength((d) => d.isMostExtreme ? 0.40 : 0.15))
            .force('y', d3.forceY((d) => d.targetY ?? height / 2).strength((d) => d.isMostExtreme ? 0.40 : 0.15))
            .force('collide', d3.forceCollide((d) => d.r + 6).strength(0.98))
            .alphaTarget(0.015);

          simRef.current.on('tick', () => {
            setTick((prev) => prev + 1);
          });
        } else {
          simRef.current.nodes(nextNodes);
          simRef.current.force('x', d3.forceX((d) => d.targetX ?? width / 2).strength((d) => d.isMostExtreme ? 0.40 : 0.15));
          simRef.current.force('y', d3.forceY((d) => d.targetY ?? height / 2).strength((d) => d.isMostExtreme ? 0.40 : 0.15));
          simRef.current.force('collide', d3.forceCollide((d) => d.r + 6).strength(0.98));
          simRef.current.alpha(0.35).restart();
        }
      }, [radarTokens, activeAddress, dimensions.width, dimensions.height]);

      const handleNodeMouseDown = (e, node) => {
        e.stopPropagation();
        e.preventDefault();

        const startX = e.clientX;
        const startY = e.clientY;
        const initNodeX = node.x ?? dimensions.width / 2;
        const initNodeY = node.y ?? dimensions.height / 2;

        if (simRef.current) {

        node.fx = initNodeX;

        const onMouseMove = (moveEvent) => {

          const minY = node.r + 8;

          node.fx = Math.max(minX, Math.min(maxX, initNodeX + dx));
          node.fy = Math.max(minY, Math.min(maxY, initNodeY + dy));
        };

        const onMouseUp = () => {
          node.fx = null;
          node.fy = null;
          if (simRef.current) {
            simRef.current.alphaTarget(0.015);
          }
          window.removeEventListener('mousemove', onMouseMove);
          window.removeEventListener('mouseup', onMouseUp);
        };

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseup', onMouseUp);
      };

      const currentNodes = nodesRef.current;

      const activeSelectedToken = tokens.find((t) => t.address === activeAddress) || null;

            </span>
          </div>

          <div ref={containerRef} className="flex-1 w-full bg-navy-dark/30 relative overflow-hidden min-h-[220px]">
            {tokens.length === 0 ? (
              <div className="absolute inset-0 flex flex-col justify-center items-center text-center p-4 select-none animate-pulse">
                <span className="text-[9px] font-mono tracking-widest text-slate-500 uppercase">

            ) : (
              <svg width={dimensions.width} height={dimensions.height} className="block select-none overflow-hidden">
                <g opacity="0.3" pointerEvents="none">

    function SniperCanvas({ token, timeframe, onTimeframeChange, connectionStatus }) {

            const { width, height } = entry.contentRect;
            setDimensions({
              width: Math.max(300, width),
              height: Math.max(260, height),
            });
          }
        });
        resizeObserver.observe(containerRef.current);
        return () => resizeObserver.disconnect();
      }, []);

      const formatPriceValue = (val) => {
        if (val === 0) return '0.00';
        if (val < 0.001) return val.toFixed(6);
        if (val < 1) return val.toFixed(4);
        if (val < 100) return val.toFixed(2);
        return val.toLocaleString(undefined, { maximumFractionDigits: 1 });
      };

      const formatDate = (timeSecsOrMs) => {
        const isSeconds = timeSecsOrMs < 5000000000;
        const d = new Date(isSeconds ? timeSecsOrMs * 1000 : timeSecsOrMs);
        const day = d.getDate().toString().padStart(2, '0');
        const month = (d.getMonth() + 1).toString().padStart(2, '0');
        const hours = d.getHours().toString().padStart(2, '0');
        const minutes = d.getMinutes().toString().padStart(2, '0');
        return `${day}/${month} ${hours}:${minutes}`;
      };

      const getClosestCandleIndex = (mouseX, candlesCount, chartWidth, paddingLeft) => {
        if (candlesCount <= 1) return 0;
        const relativeX = mouseX - paddingLeft;
        const fraction = relativeX / chartWidth;
        const calculatedIndex = Math.round(fraction * (candlesCount - 1));
        return Math.min(candlesCount - 1, Math.max(0, calculatedIndex));
      };

      const candles = token 
        ? (timeframe === 'm5' ? token.candlesM5 : timeframe === 'm15' ? token.candlesM15 : token.candlesH1)
        : [];

      const sortedcandles = useMemo(() => {
        return [...(candles || [])].sort((a, b) => a.time - b.time);
      }, [candles]);

      const paddingRight = 70;
      const paddingBottom = 24;
      const paddingTop = 28;
      const paddingLeft = 14;

      const chartWidth = dimensions.width - paddingLeft - paddingRight;
      const chartHeight = dimensions.height - paddingTop - paddingBottom;

      const getX = (index) => {
        if (sortedcandles.length <= 1) return paddingLeft;
        return paddingLeft + (index / (sortedcandles.length - 1)) * chartWidth;
      };

      const hoveredIndex = hoverPos && hoverPos.active && sortedcandles.length > 0
        ? getClosestCandleIndex(hoverPos.x, sortedcandles.length, chartWidth, paddingLeft)
        : null;

      const activeCandle = hoveredIndex !== null && sortedcandles[hoveredIndex]
        ? sortedcandles[hoveredIndex]
        : (sortedcandles.length > 0 ? sortedcandles[sortedcandles.length - 1] : null);

      const candleVar = activeCandle ? ((activeCandle.close - activeCandle.open) / activeCandle.open) * 100 : 0;

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas || !token) return;

        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        ctx.clearRect(0, 0, dimensions.width, dimensions.height);

        if (connectionStatus === 'OFFLINE') {
          ctx.fillStyle = '#ef4444';
          ctx.font = 'bold 11px var(--font-mono)';

          ctx.fillStyle = '#64748b';
          ctx.font = '8.5spx var(--font-mono)';
          ctx.fillText('FUENTES DE DATOS INTERRUMPIDAS', dimensions.width / 2, dimensions.height / 2 + 10);
          return;
        }

        if (sortedcandles.length === 0) {
          ctx.fillStyle = '#64748b';
          ctx.font = '11px var(--font-mono)';
          ctx.textAlign = 'center';
          ctx.fillText('CARGANDO COMPORTAMIENTO VELAS...', dimensions.width / 2, dimensions.height / 2);
          return;
        }

        let minPrice = Infinity;
        let maxPrice = -Infinity;

        const emaPeriod = 9;
        const k = 2 / (emaPeriod + 1);
        const emaValues = [];
        
        if (sortedcandles.length > 0) {
          let currentEma = sortedcandles[0].close;
          emaValues.push(currentEma);
          for (let i = 1; i < sortedcandles.length; i++) {
            currentEma = sortedcandles[i].close * k + currentEma * (1 - k);
            emaValues.push(currentEma);
          }
        }

        sortedcandles.forEach((c, idx) => {
          if (c.high > maxPrice) maxPrice = c.high;
          if (c.low < minPrice) minPrice = c.low;
          if (emaValues[idx] > maxPrice) maxPrice = emaValues[idx];
          if (emaValues[idx] < minPrice) minPrice = emaValues[idx];
        });

        const levels = [];
        if (token.analysis) {
          levels.push(...token.analysis.h1Support, ...token.analysis.h1Resistance);
        }
        levels.forEach((lvl) => {
          if (lvl > maxPrice) maxPrice = lvl;
          if (lvl < minPrice) minPrice = lvl;
        });

        const range = maxPrice - minPrice;
        minPrice -= range * 0.08 || minPrice * 0.01;
        maxPrice += range * 0.08 || maxPrice * 0.01;

        const getY = (price) => {
          if (maxPrice === minPrice) return paddingTop + chartHeight / 2;
          return paddingTop + (1 - (price - minPrice) / (maxPrice - minPrice)) * chartHeight;
        };

        // Drawprice and horizontal gridlines (8 divisions)
        ctx.strokeStyle = 'rgba(148, 163, 184, 0.04)';
        ctx.lineWidth = 1;
        const horizontalDivs = 8;
        for (let i = 0; i <= horizontalDivs; i++) {
          const y = paddingTop + (i / horizontalDivs) * chartHeight;
          ctx.beginPath();
          ctx.moveTo(paddingLeft, y);
          ctx.lineTo(dimensions.width - paddingRight, y);
          ctx.stroke();

          const priceVal = maxPrice - (i / horizontalDivs) * (maxPrice - minPrice);
          ctx.fillStyle = '#64748b';
          ctx.font = '9px var(--font-mono)';
          ctx.textAlign = 'left';
          ctx.fillText(formatPriceValue(priceVal), dimensions.width - paddingRight + 8, y + 3.5);
        }

        // Draw vertical division lineガイド
        ctx.strokeStyle = 'rgba(148, 163, 184, 0.03)';
        ctx.lineWidth = 1;
        const verticalDivs = 8;
        for (let j = 1; j < verticalDivs; j++) {
          const x = paddingLeft + (j / verticalDivs) * chartWidth;
          ctx.beginPath();
          ctx.moveTo(x, paddingTop);
          ctx.lineTo(x, dimensions.height - paddingBottom);
          ctx.stroke();
        }

        // Soportes y Resistencias H1 lines integration
        if (token.analysis) {
          const currentPrice = token.price;
          const supports = [...token.analysis.h1Support].filter(s => s <= currentPrice).sort((a, b) => b - a);
          const resistances = [...token.analysis.h1Resistance].filter(r => r >= currentPrice).sort((a, b) => a - b);

          const cleanSupports = supports.length > 0 ? supports : [...token.analysis.h1Support].sort((a, b) => b - a);
          const cleanResistances = resistances.length > 0 ? resistances : [...token.analysis.h1Resistance].sort((a, b) => a - b);

          const s1 = cleanSupports[0];
          const r1 = cleanResistances[0];

          if (s1 !== undefined) {
            const y = getY(s1);
            ctx.save();
            ctx.strokeStyle = 'rgba(0, 230, 118, 0.45)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 4]);
            ctx.beginPath();
            ctx.moveTo(paddingLeft, y);
            ctx.lineTo(dimensions.width - paddingRight, y);
            ctx.stroke();
            ctx.restore();

            ctx.fillStyle = '#00e676';
            ctx.font = 'bold 8px var(--font-mono)';
            ctx.textAlign = 'right';
            ctx.fillText('S1 SOPORTE', dimensions.width - paddingRight - 8, y - 4);
          }

          if (r1 !== undefined) {
            const y = getY(r1);
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 60, 95, 0.45)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 4]);
            ctx.beginPath();
            ctx.moveTo(paddingLeft, y);
            ctx.lineTo(dimensions.width - paddingRight, y);
            ctx.stroke();
            ctx.restore();

            ctx.fillStyle = '#ff3c5f';
            ctx.font = 'bold 8px var(--font-mono)';
            ctx.textAlign = 'right';
            ctx.fillText('R1 RESISTENCIA', dimensions.width - paddingRight - 8, y - 4);
          }
        }

        // Draw Candle wicks and solids
        const candleWidth = Math.max(1.5, (chartWidth / sortedcandles.length) * 0.55);
        sortedcandles.forEach((c, idx) => {
          const x = getX(idx);
          const yOpen = getY(c.open);
          const yClose = getY(c.close);
          const yHigh = getY(c.high);
          const yLow = getY(c.low);

          const isBullish = c.close >= c.open;
          ctx.strokeStyle = isBullish ? '#00e676' : '#ff3c5f';
          ctx.fillStyle = isBullish ? '#00e676' : '#ff3c5f';
          ctx.lineWidth = 1.2;

          ctx.beginPath();
          ctx.moveTo(x, yHigh);
          ctx.lineTo(x, yLow);
          ctx.stroke();

          const bodyHeight = Math.max(1, Math.abs(yClose - yOpen));
          ctx.fillRect(x - candleWidth / 2, Math.min(yOpen, yClose), candleWidth, bodyHeight);
        });

        // 9 EMA Trend curves
        if (emaValues.length > 0) {
          let trendColor = '#d4af37';
          if (token.analysis) {
            if (token.analysis.h1Trend === 'BULLISH') trendColor = '#00e676';
            else if (token.analysis.h1Trend === 'BEARISH') trendColor = '#ff3c5f';
          }

          ctx.save();
          ctx.strokeStyle = trendColor;
          ctx.lineWidth = 2.2;
          ctx.shadowColor = trendColor;
          ctx.shadowBlur = 5;

          ctx.beginPath();
          for (let i = 0; i < emaValues.length; i++) {
            const x = getX(i);
            const y = getY(emaValues[i]);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
          ctx.restore();
        }

        // Latest focus price tag floating node
        if (sortedcandles.length > 0) {
          const latestCandle = sortedcandles[sortedcandles.length - 1];
          const currentY = getY(latestCandle.close);
          const isUp = latestCandle.close >= latestCandle.open;
          const priceColor = isUp ? '#00e676' : '#ff3c5f';

          ctx.save();
          ctx.strokeStyle = priceColor;
          ctx.lineWidth = 1;
          ctx.setLineDash([2, 3]);
          ctx.beginPath();
          ctx.moveTo(getX(sortedcandles.length - 1), currentY);
          ctx.lineTo(dimensions.width - paddingRight, currentY);
          ctx.stroke();
          ctx.restore();

          if (currentY >= paddingTop && currentY <= dimensions.height - paddingBottom) {
            ctx.save();
            ctx.fillStyle = priceColor;
            ctx.shadowColor = priceColor;
            ctx.shadowBlur = 4;

            const tagWidth = 65;
            const tagHeight = 16;
            const tagX = dimensions.width - paddingRight + 2;
            const tagY = currentY - tagHeight / 2;

            ctx.beginPath();
            ctx.rect(tagX, tagY, tagWidth, tagHeight);
            ctx.fill();

            ctx.fillStyle = '#030712';
            ctx.font = 'bold 9px var(--font-mono)';
            ctx.textAlign = 'center';
            ctx.shadowBlur = 0;
            ctx.fillText(formatPriceValue(latestCandle.close), tagX + tagWidth / 2, tagY + tagHeight / 2 + 3);
            ctx.restore();
          }
        }

        // Cursor guide grids
        if (hoverPos && hoverPos.active && hoveredIndex !== null && hoveredIndex >= 0 && hoveredIndex < sortedcandles.length) {
          const snappedX = getX(hoveredIndex);
          const crosshairY = hoverPos.y;

          ctx.save();
          ctx.strokeStyle = 'rgba(148, 163, 184, 0.4)';
          ctx.lineWidth = 1;
          ctx.setLineDash([3, 3]);

          ctx.beginPath();
          ctx.moveTo(snappedX, paddingTop);
          ctx.lineTo(snappedX, dimensions.height - paddingBottom);
          ctx.stroke();

          if (crosshairY >= paddingTop && crosshairY <= dimensions.height - paddingBottom) {
            ctx.beginPath();
            ctx.moveTo(paddingLeft, crosshairY);
            ctx.lineTo(dimensions.width - paddingRight, crosshairY);
            ctx.stroke();
          }
          ctx.restore();

          // Price bubble tag
          if (crosshairY >= paddingTop && crosshairY <= dimensions.height - paddingBottom) {
            const hoverPrice = maxPrice - ((crosshairY - paddingTop) / chartHeight) * (maxPrice - minPrice);
            const formattedHoverPrice = formatPriceValue(hoverPrice);

            ctx.fillStyle = '#1e293b';
            ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
            ctx.lineWidth = 1;

            const badgeWidth = 65;
            const badgeHeight = 16;
            const badgeX = dimensions.width - paddingRight + 2;
            const badgeY = crosshairY - badgeHeight / 2;

            ctx.beginPath();
            ctx.rect(badgeX, badgeY, badgeWidth, badgeHeight);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#f8fafc';
            ctx.font = 'bold 9px var(--font-mono)';
            ctx.textAlign = 'center';
            ctx.fillText(formattedHoverPrice, badgeX + badgeWidth / 2, badgeY + badgeHeight / 2 + 3);
          }

          // Date bubble tag
          const hoveredCandle = sortedcandles[hoveredIndex];
          const stampStr = formatDate(hoveredCandle.time);

          ctx.fillStyle = '#1e293b';
          ctx.strokeStyle = 'rgba(212, 175, 55, 0.4)';
          ctx.lineWidth = 1;

          const timeBadgeWidth = 84;
          const timeBadgeHeight = 15;
          const timeBadgeX = snappedX - timeBadgeWidth / 2;
          const timeBadgeY = dimensions.height - paddingBottom + 2;

          ctx.beginPath();
          ctx.rect(timeBadgeX, timeBadgeY, timeBadgeWidth, timeBadgeHeight);
          ctx.fill();
          ctx.stroke();

          ctx.fillStyle = '#f8fafc';
          ctx.font = 'bold 8.5px var(--font-mono)';
          ctx.textAlign = 'center';
          ctx.fillText(stampStr, timeBadgeX + timeBadgeWidth / 2, timeBadgeY + timeBadgeHeight / 2 + 3);
        }

      }, [dimensions, token, timeframe, hoverPos, sortedcandles, chartWidth, chartHeight]);

      const handleMouseMove = (e) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        setHoverPos({ x, y, active: true });
      };

      const handleMouseLeave = () => {
        setHoverPos(null);
      };

      const handleTouchMove = (e) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const touch = e.touches[0];
        if (!touch) return;
        const rect = canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        setHoverPos({ x, y, active: true });
      };

      if (!token) {
        return (
          <div className="glass flex-1 rounded-xl border border-navy-border flex flex-col justify-center items-center p-6 text-center text-slate-400 gap-3">
            <Icon name="loader-2" className="w-8 h-8 animate-spin text-gold-corp" />
            <span className="font-mono text-xs tracking-wider">SELECCIONA O INDEXA UN COMPONENTE EN TU WATCHLIST</span>
          </div>
        );
      }

      return (
        <div className="glass p-4 rounded-xl border border-[#1e293b]/70 flex-1 flex flex-col overflow-hidden relative">
          
          <div className="flex justify-between items-center mb-4 shrink-0 flex-wrap gap-2 select-none">
            <div className="flex items-center gap-2.5">
              <span className="text-xs font-mono font-bold text-gold-bright bg-gold-dim px-2.5 py-1 rounded border border-gold-corp/30">
                {token.symbol}

              <div className="text-sm font-bold tracking-tight text-slate-100">{token.name}</div>
            </div>

            <div className="flex gap-1 bg-navy-dark p-1 rounded-lg border border-navy-light text-[9.5px] font-mono">
              {['m5', 'm15', 'h1'].map((tf) => (
                <button

                  className={`px-3 py-1 rounded transition-all duration-200 capitalize font-bold cursor-pointer ${

          <div ref={containerRef} className="flex-1 rounded-lg overflow-hidden border border-navy-light/35 relative bg-[#030712] min-h-[220px]">
            {connectionStatus === 'OFFLINE' && (
              <div className="absolute inset-0 z-30 bg-[#030712]/85 backdrop-blur-[4px] flex flex-col items-center justify-center gap-3 select-none">
                <div className="w-10 h-10 rounded-full border border-rose-500/20 bg-rose-500/5 flex items-center justify-center">
                  <span className="w-2.5 h-2.5 rounded-full bg-rose-500 animate-ping" />
                </div>
                <div className="font-mono text-xs tracking-widest text-rose-500 font-black animate-pulse">
                  ● RECONECTANDO...
                </div>
                <p className="text-[9px] text-slate-400 font-mono tracking-widest max-w-[280px] text-center uppercase leading-relaxed">
                  Buscando feeds reales en Birdeye / DexScreener...

            {activeCandle && connectionStatus !== 'OFFLINE' && (
              <div className="absolute top-2 left-3 z-10 font-mono text-[8.5px] text-slate-450 bg-navy-dark/95 px-2.5 py-1 rounded border border-[#1e293b]/60 flex flex-wrap items-center gap-3 select-none pointer-events-none text-slate-300">

                <span>H: <span className="text-cyber-green">{formatPriceValue(activeCandle.high)}</span></span>
                <span>L: <span className="text-cyber-red">{formatPriceValue(activeCandle.low)}</span></span>
                <span>C: <span className={activeCandle.close >= activeCandle.open ? 'text-cyber-green' : 'text-cyber-red'}>{formatPriceValue(activeCandle.close)}</span></span>
                <span>Var: <span className={candleVar >= 0 ? 'text-cyber-green font-bold' : 'text-cyber-red font-bold'}>{candleVar >= 0 ? '+' : ''}{candleVar.toFixed(2)}%</span></span>
              </div>
            )}

            <canvas
              ref={canvasRef}
              width={dimensions.width}
              height={dimensions.height}
              onMouseMove={handleMouseMove}
              onMouseLeave={handleMouseLeave}
              onTouchMove={handleTouchMove}
              onTouchEnd={handleMouseLeave}

            />

          <div className="mt-3 flex items-center justify-between text-[10px] text-slate-500 font-mono select-none">

            <span className="text-gold-corp uppercase font-bold text-[9px] tracking-wide">9 EMA Y SOPORTE H1 DIRECTO</span>
          </div>
        </div>
      );

    // Dynamic signal event timeline tracking

      const containerRef = useRef(null);

      useEffect(() => {

          containerRef.current.scrollTop = 0;
        }
      }, [events]);

          return isRed 
            ? 'border-l border-cyber-red bg-cyber-red/5 text-[#ff3c5f] font-bold glow-red' 
            : 'border-l border-cyber-green bg-cyber-green/5 text-emerald-400 font-bold glow-green';

            return <Icon name="zap" className="w-3.5 h-3.5 text-cyber-red shrink-0 animate-pulse" />;

            return <Icon name="trending-up" className="w-3.5 h-3.5 text-gold-corp shrink-0" />;

            return <Icon name="activity" className="w-3.5 h-3.5 text-sky-400 shrink-0" />;
          default:
            return <Icon name="award" className="w-3.5 h-3.5 text-slate-400 shrink-0" />;
        }
      };

      const confirmationEvent = events.find(e => e.type === 'entry_valid' || e.type === 'exit_valid' || e.importance === 'high');

      // Actual WebSocket Connection
      const connectWebSocket = () => {
        if (socketRef.current) {
          try { socketRef.current.close(); } catch(e) {}
        }
        if (reconnectTimeoutRef.current) {
          clearTimeout(reconnectTimeoutRef.current);
        }

        console.log('[SNIPER DATA ENGINE] Opening authentic WebSocket pipe...');
        const startTime = Date.now();

        try {
          // Public DexScreener streaming endpoint
          const ws = new WebSocket('wss://io.dexscreener.com/dex/websocket');
          socketRef.current = ws;

          ws.onopen = () => {
            const lat = Date.now() - startTime;
            setLatencyMs(lat);
            setConnectionStatus('DEXSCREENER');
            connectionErrorCountRef.current = 0;
            lastTickTimeRef.current = Date.now();
            console.log(`%c[SNIPER ENGINE CLOUD] Socket OPEN. Est. latency: ${lat}ms. Mode: EVENT-DRIVEN TICK FEED`, 'color: #00e676; font-weight: bold;');
          };

          ws.onmessage = (event) => {
            lastTickTimeRef.current = Date.now();
            setConnectionStatus('DEXSCREENER');
            
            // Log incoming real-time network ticks if meaningful
            try {
              const parsed = JSON.parse(event.data);
              if (parsed && parsed.data) {
                console.log('[SNIPER ENGINE TICK]', parsed.data);
              }
            } catch(e) {}
          };

          ws.onerror = (err) => {
            console.warn('[SNIPER ENGINE WARN] Connection failure, switching traffic flows to high-frequency REST failover.', err);
            setConnectionStatus('FAILOVER');
          };

          ws.onclose = () => {
            console.log('[SNIPER ENGINE CLOSE] Peer disconnected socket.');
            setConnectionStatus('FAILOVER');

            // Robust backoff automatic reconnection
            connectionErrorCountRef.current += 1;
            const waitTime = Math.min(30000, 2000 * Math.pow(2, connectionErrorCountRef.current));
            reconnectTimeoutRef.current = setTimeout(() => {
              connectWebSocket();
            }, waitTime);
          };

        } catch (e) {
          console.error('[SNIPER ENGINE ERROR] Failed to initialize socket handle:', e);
          setConnectionStatus('FAILOVER');
        }
      };

                ) : (
                  <>
                    <Icon name="volume-x" className="w-4 h-4 text-slate-550" />
                    <span className="text-slate-500">MUTE</span>
                  </>
                )}
              </button>

              <div className="text-right hidden md:block border-l border-[#1e293b] pl-5">
                <div className="font-mono text-xs text-slate-200 flex items-center gap-1.5 font-bold">
                  <Icon name="clock" className="w-3.5 h-3.5 text-gold-corp" />
                  <span>{utcTime}</span>
                </div>
              </div>

            </div>
          </header>

          {/* Three Panels Core Stage */}
          <main className="flex-1 max-w-[1680px] w-full mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-4 overflow-hidden h-[calc(100vh-80px)]">
            
            {/* Left Sidebar (Columns: 4) */}
            <div className="lg:col-span-4 flex flex-col gap-4 overflow-y-auto pr-0.5">
              
              <StandaloneIndexer 
                onAddToken={handleAddNewToken}
                onAddMultipleTokens={handleImportBatchTokens}
                tokenCount={tokens.length}
                onClearWatchlist={handleClear}
              />

              <div className="bg-navy-card rounded-xl border border-navy-border p-4 flex flex-col gap-3 flex-1 min-h-[300px]">
                <div className="flex items-center justify-between border-b border-[#1e293b]/70 pb-2 select-none">
                  <span className="text-xs font-mono font-bold uppercase text-slate-300">Monitores del Sistema ({filteredTokens.length})</span>
                  
                  <div className="flex bg-navy-dark border border-navy-border p-0.5 rounded text-[9.5px] font-mono">
                    <button onClick={() => setFilter('all')} className={`px-2 py-0.5 rounded cursor-pointer ${filter==='all' ? 'bg-gold-corp text-navy-dark font-extrabold' : 'text-slate-400 hover:text-slate-250'}`}>Todos</button>
                    <button onClick={() => setFilter('buy')} className={`px-2 py-0.5 rounded cursor-pointer ${filter==='buy' ? 'bg-emerald-500 text-white font-extrabold' : 'text-slate-400 hover:text-slate-250'}`}>Buy (≤35)</button>
                    <button onClick={() => setFilter('sell')} className={`px-2 py-0.5 rounded cursor-pointer ${filter==='sell' ? 'bg-rose-500 text-white font-extrabold' : 'text-slate-400 hover:text-slate-250'}`}>Sell (≥65)</button>
                  </div>
                </div>

                <div className="relative">
                  <input
                    type="text"
                    value={searchQuery}
                    onChange={(e)=>setSearchQuery(e.target.value)}
                    placeholder="Filtrar por Símbolo o CA..."
                    className="w-full bg-navy-dark border border-navy-border/60 focus:border-gold-corp/60 outline-none rounded py-2 pl-7 pr-3 text-[10px] text-slate-300 placeholder-slate-650 font-mono"
                  />
                  <div className="absolute left-2.5 top-2.5 text-slate-600">
                    <Icon name="search" className="w-3.5 h-3.5" />
                  </div>
                </div>

                <div className="flex-1 overflow-y-auto max-h-[380px] flex flex-col gap-2 pr-1">
                  {filteredTokens.length === 0 ? (
                    <div className="text-center py-10 text-slate-650 font-mono text-[10px] select-none uppercase tracking-widest animate-pulse">
                      Ningún activo coincide con la búsqueda
                    </div>
                  ) : (
                    filteredTokens.map(t => (
                      <TokenCard
                        key={t.address}
                        token={t}
                        isActive={t.address === activeAddress}
                        onSelect={setActiveAddress}
                        onDelete={deleteTokenItem}
                      />
                    ))
                  )}
                </div>
              </div>

              {/* Status Energy Pressure Indicator */}
              <div className="glass p-4 rounded-xl border border-navy-border flex flex-col justify-between shrink-0 bg-navy-card/95 gap-3">
                <div className="flex flex-col gap-3">
                  <div className="flex items-center justify-between select-none">
                    <div className="flex items-center gap-1.5">
                      <Icon name="activity" className="w-4 h-4 text-gold-corp animate-pulse" />
                      <span className="text-[10px] font-mono tracking-widest text-slate-300 uppercase font-black">
                        MÉTRICA DE ENERGÍA
                      </span>
                    </div>
                    
                    <select
                      value={rsiTimeframe}
                      onChange={(e) => setRsiTimeframe(e.target.value)}
                      className="bg-navy-dark border border-navy-light text-[9px] font-mono text-gold-bright rounded px-1.5 py-0.5 outline-none cursor-pointer focus:border-gold-corp"
                    >
                      <option value="m5">M5 (Nativo)</option>
                      <option value="m15">M15</option>
                      <option value="h1">H1 (Macro)</option>
                    </select>
                  </div>

                  <LiveBuyersSellers activeToken={activeToken} />
                </div>
              </div>

            </div>

            {/* Middle Section: Chart Canvas and Timelines (Columns: 5) */}
            <div className="lg:col-span-5 flex flex-col gap-4 overflow-y-auto">
              <SniperCanvas 
                token={activeToken}
                timeframe={timeframe}
                onTimeframeChange={setTimeframe}
                connectionStatus={connectionStatus}
              />

              <SignalTimeline 
                events={timelineEvents[activeAddress] || []}
                tokenSymbol={activeToken ? activeToken.symbol : '---'}
                onClear={() => setTimelineEvents(prev => ({ ...prev, [activeAddress]: [] }))}
              />
            </div>

            {/* Right Section: Momentum Radar Dashboard (Columns: 3) */}
            <div className="lg:col-span-3 flex flex-col gap-4 overflow-y-auto p-0.5">
              <StandaloneRsiBubbleRadar
                tokens={tokens}
                activeAddress={activeAddress}
                onSelectToken={setActiveAddress}
                rsiTimeframe={rsiTimeframe}
              />
              
              {/* Strategy alert card panel */}
              {activeToken && (
                <div className="bg-navy-card rounded-xl border border-[#d4af37]/35 p-4 flex flex-col gap-3 relative overflow-hidden">
                  <div className="absolute -right-6 -top-6 w-20 h-20 bg-gold-dim rounded-full pointer-events-none blur-xl" />
                  
                  <div className="flex items-center justify-between border-b border-[#1e293b]/70 pb-2.5">
                    <div className="flex items-center gap-2">
                      <div className="w-2.5 h-2.5 bg-gold-corp rounded-full animate-pulse" />
                      <div>
                        <h4 className="font-mono text-xs font-extrabold text-white leading-tight uppercase flex items-center gap-1.5">
                          {activeToken.symbol}
                          <span className="text-[8px] border border-gold-corp/30 text-gold-bright bg-gold-dim px-1.5 py-0.5 rounded leading-none">{activeToken.name}</span>
                        </h4>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-3 divide-x divide-[#1e293b]">
                    <div>
                      <span className="text-[9px] font-mono text-slate-550 text-slate-500 uppercase block">Precio actual</span>
                      <strong className="font-mono text-sm font-black text-gold-bright mt-1 block">${activeToken.price.toFixed(activeToken.price < 0.01 ? 6 : 4)}</strong>
                    </div>
                    <div className="pl-3">
                      <span className="text-[9px] font-mono text-slate-550 text-slate-500 uppercase block">RSI actual</span>
                      <strong className={`font-mono text-sm font-black mt-1 block ${activeToken.rsi <= 35 ? 'text-cyber-green' : activeToken.rsi >= 65 ? 'text-cyber-red' : 'text-slate-300'}`}>{activeToken.rsi.toFixed(1)}</strong>
                    </div>
                  </div>

                  <div className="flex flex-col gap-2 pt-1 select-none">
                    <span className="text-[9px] font-mono text-slate-500 uppercase font-black uppercase tracking-wider block">ANÁLISIS DE SCORE & CALIBRACIÓN (MEME)</span>
                    <div className="bg-navy-dark p-2 rounded-lg border border-navy-border flex flex-col gap-1.5">
                      <div className="flex items-center justify-between text-[8px] font-mono text-slate-400 mb-0.5">
                        <span>SCORE DE MOMENTUM</span>
                        <span className="font-extrabold text-gold-bright">{activeToken.score}/99</span>
                      </div>
                      <div className="w-full bg-[#1e293b]/50 h-1.5 rounded-sm overflow-hidden border border-slate-800">
                        <div className="bg-gradient-to-r from-gold-corp to-gold-bright h-full transition-all duration-500" style={{ width: `${activeToken.score}%` }} />
                      </div>

                      <div className="flex items-center justify-between text-[9px] font-mono pt-1 text-slate-300 leading-none mt-1">
                        <span>Recomendación:</span>
                        <span className={`font-black uppercase px-2 py-0.5 rounded text-[8.5px] ${
                          activeToken.rsi <= 35 
                            ? 'bg-cyber-green/10 text-cyber-green border border-cyber-green/20' 
                            : activeToken.rsi >= 65 
                              ? 'bg-cyber-red/10 text-cyber-red border border-cyber-red/20' 
                              : 'bg-slate-800 text-slate-400 border border-slate-705'
                        }`}>
                          {activeToken.rsi <= 35 ? 'COMPRE OVERSOLD' : activeToken.rsi >= 65 ? 'VENTA OVERBOUGHT' : 'MANTENER / LATERAL'}
                        </span>
                      </div>
                    </div>
                  </div>

                  <div className="flex flex-col gap-2">
                    <span className="text-[9px] font-mono text-slate-500 uppercase font-black tracking-wider flex items-center gap-1">
                      <Icon name="shield-alert" className="w-3 h-3 text-red-400" />
                      Planificar entrada / Sniper alert
                    </span>
                    <div className="grid grid-cols-2 gap-2 text-[10px] font-mono text-slate-400">
                      <div className="bg-navy-dark p-2 rounded border border-navy-border/60">
                        <span className="text-[7.5px] text-slate-500 block uppercase leading-none">Trigger Entrada</span>
                        <strong className="text-slate-200 mt-1 block">${(activeToken.price * 0.95).toFixed(activeToken.price < 0.01 ? 6 : 3)}</strong>
                      </div>
                      <div className="bg-navy-dark p-2 rounded border border-navy-border/60">
                        <span className="text-[7.5px] text-slate-500 block uppercase leading-none">Frenado Stop loss</span>
                        <strong className="text-[#ff3c5f] mt-1 block">${(activeToken.price * 0.90).toFixed(activeToken.price < 0.01 ? 6 : 3)}</strong>
                      </div>
                    </div>
                  </div>

                </div>
              )}

            </div>

          </main>

          {/* Standalone copy notification status indicator footer */}
          <footer className="bg-navy-card/80 border-t border-[#1e293b]/60 px-5 py-4 text-center text-slate-500 font-mono text-[9px] uppercase select-none mt-auto">
            <span>Para utilizar localmente, guarda este archivo como <strong className="text-slate-400 font-bold">standalone-radar.html</strong> e introduce cualquier Watchlist de Solana sin límites.</span>
          </footer>

        </div>
      );
    }

    // Mount and inject inside root container node
    const container = document.getElementById('standalone-root');
    const root = ReactDOM.createRoot(container);
    root.render(<StandaloneDashboard />);
  </script>
</body>
</html>
