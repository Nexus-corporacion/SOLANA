    const { useState, useEffect, useRef, useMemo } = React;

    // --- AUDIO GENERATOR ENGINE (Web Audio API) ---
    let audioCtx = null;
    function getAudioContext() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (AudioContextClass) {
          audioCtx = new AudioContextClass();
        }
      }
      return audioCtx;
    }

    function playChime(freqStart, freqEnd, duration, type = 'sine') {
      try {
        const ctx = getAudioContext();
        if (!ctx) return;
        if (ctx.state === 'suspended') {
          ctx.resume();
        }
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freqStart, ctx.currentTime);
        if (freqEnd !== freqStart) {
          osc.frequency.exponentialRampToValueAtTime(freqEnd, ctx.currentTime + duration);
        }

        gainNode.gain.setValueAtTime(0.12, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

        osc.connect(gainNode);
        gainNode.connect(ctx.destination);

        osc.start();
        osc.stop(ctx.currentTime + duration);
      } catch (err) {
        console.warn('Audio Context is disabled or blocked:', err);
      }
    }

    // --- QUANT MATHEMATICS ENGINES ---
    function calculateRSI(closes, period = 14) {
      if (closes.length <= period) return 50;
      let gains = 0;
      let losses = 0;
      for (let i = 1; i <= period; i++) {
        const diff = closes[i] - closes[i - 1];
        if (diff > 0) gains += diff;
        else losses -= diff;
      }
      let avgGain = gains / period;
      let avgLoss = losses / period;

      for (let i = period + 1; i < closes.length; i++) {
        const diff = closes[i] - closes[i - 1];
        const gain = diff > 0 ? diff : 0;
        const loss = diff < 0 ? -diff : 0;
        avgGain = (avgGain * (period - 1) + gain) / period;
        avgLoss = (avgLoss * (period - 1) + loss) / period;
      }
      if (avgLoss === 0) return 100;
      const rs = avgGain / avgLoss;
      const rsi = 100 - 100 / (1 + rs);
      return parseFloat(rsi.toFixed(2));
    }

    function calculateMarketStructure(candles) {
      if (candles.length < 5) {
        return { peaks: [], currentTrend: 'NEUTRAL' };
      }
      const peaks = [];
      const len = candles.length;
      let lastHigh = null;
      let lastLow = null;

      for (let i = 2; i < len - 2; i++) {
        const prev2 = candles[i - 2];
        const prev1 = candles[i - 1];
        const curr = candles[i];
        const next1 = candles[i + 1];
        const next2 = candles[i + 2];

        // check peak high
        if (curr.high > prev1.high && curr.high > prev2.high && curr.high > next1.high && curr.high > next2.high) {
          let type = 'HH';
          if (lastHigh && curr.high < lastHigh.price) type = 'LH';
          const newPeak = { type, price: parseFloat(curr.high.toFixed(6)), time: curr.time };
          peaks.push(newPeak);
          lastHigh = newPeak;
        }

        // check low trough
        if (curr.low < prev1.low && curr.low < prev2.low && curr.low < next1.low && curr.low < next2.low) {
          let type = 'HL';
          if (lastLow && curr.low < lastLow.price) type = 'LL';
          const newPeak = { type, price: parseFloat(curr.low.toFixed(6)), time: curr.time };
          peaks.push(newPeak);
          lastLow = newPeak;
        }
      }

      let bullishCount = 0;
      let bearishCount = 0;
      peaks.forEach((p) => {
        if (p.type === 'HH' || p.type === 'HL') bullishCount++;
        else bearishCount++;
      });

      let currentTrend = 'NEUTRAL';
      if (bullishCount > bearishCount + 1) currentTrend = 'ALCISTA';
      else if (bearishCount > bullishCount + 1) currentTrend = 'BAJISTA';

      return { peaks: peaks.slice(-8), currentTrend };
    }

    function calculateConfluenceScore(rsi, trend, buyers, structure) {
      let score = 30;
      if (rsi <= 10 || rsi >= 90) score += 35;
      else if (rsi <= 20 || rsi >= 80) score += 25;
      else if (rsi >= 30 && rsi <= 70) score -= 10;
      else score += 10;

      const isBullishPressure = buyers > 55;
      const isBearishPressure = buyers < 45;

      if (trend === 'ALCISTA' && isBullishPressure) score += 20;
      else if (trend === 'BAJISTA' && isBearishPressure) score += 20;
      else if (trend === 'NEUTRAL') score += 5;
      else score -= 10;

      const peakTypes = structure.peaks.map(p => p.type);
      if (trend === 'ALCISTA') {
        const hhCount = peakTypes.filter(t => t === 'HH' || t === 'HL').length;
        score += Math.min(hhCount * 3, 15);
      } else if (trend === 'BAJISTA') {
        const lhCount = peakTypes.filter(t => t === 'LH' || t === 'LL').length;
        score += Math.min(lhCount * 3, 15);
      }

      if (rsi <= 20 && trend === 'ALCISTA') score += 10;
      else if (rsi >= 80 && trend === 'BAJISTA') score += 10;

      return Math.max(0, Math.min(100, score));
    }

    function generateHistoricCandles(basePrice) {
      const candles = [];
      let currentPrice = basePrice * 0.95;
      const now = new Date();
      for (let i = 30; i >= 0; i--) {
        const time = new Date(now.getTime() - i * 60 * 1000).toISOString();
        const change = (Math.random() - 0.48) * (basePrice * 0.015);
        const open = currentPrice;
        const close = currentPrice + change;
        const high = Math.max(open, close) + Math.random() * (basePrice * 0.005);
        const low = Math.min(open, close) - Math.random() * (basePrice * 0.005);
        candles.push({ open, high, low, close, time });
        currentPrice = close;
      }
      return candles;
    }

    // 2. SVG Based Candlestick + RSI Graphic
    function QuantCandleChart({ candles, structure, symbol, rsi }) {
      const width = 600;
      const height = 280;
      const rsiHeight = 90;
      const margin = { top: 20, right: 35, bottom: 20, left: 45 };

      const boundaries = useMemo(() => {
        if (candles.length === 0) return { min: 0, max: 100 };
        let max = -Infinity;
        let min = Infinity;
        candles.forEach((c) => {
          if (c.high > max) max = c.high;
          if (c.low < min) min = c.low;
        });
        const padding = (max - min) * 0.1 || 1;
        return { min: min - padding, max: max + padding };
      }, [candles]);

      const priceToY = (price) => {
        const range = boundaries.max - boundaries.min;
        const chartHeight = height - margin.top - margin.bottom;
        return margin.top + chartHeight - ((price - boundaries.min) / range) * chartHeight;
      };

      const indexToX = (index) => {
        const chartWidth = width - margin.left - margin.right;
        const step = chartWidth / Math.max(1, candles.length - 1);
        return margin.left + index * step;
      };

      const mappedCandles = useMemo(() => {
        return candles.map((c, i) => {
          const x = indexToX(i);
          const isUp = c.close >= c.open;
          const yOpen = priceToY(c.open);
          const yClose = priceToY(c.close);
          const yHigh = priceToY(c.high);
          const yLow = priceToY(c.low);
          const top = Math.min(yOpen, yClose);
          const bottom = Math.max(yOpen, yClose);
          return {
            x,
            yHigh,
            yLow,
            top,
            height: Math.max(1.5, bottom - top),
            isUp,
            closePrice: c.close,
            time: c.time,
          };
        });
      }, [candles, boundaries]);

      const peakOverlays = useMemo(() => {
        return structure.peaks.map((peak) => {
          let bestIndex = -1;
          let minDiff = Infinity;
          candles.forEach((c, idx) => {
            const timeDiff = Math.abs(new Date(c.time).getTime() - new Date(peak.time).getTime());
            if (timeDiff < minDiff) {
              minDiff = timeDiff;
              bestIndex = idx;
            }
          });
          if (bestIndex !== -1) {
            return {
              ...peak,
              cx: indexToX(bestIndex),
              cy: priceToY(peak.price),
              isHigh: peak.type === 'HH' || peak.type === 'LH',
            };
          }
          return null;
        }).filter(Boolean);
      }, [structure, candles, boundaries]);

      const rsiToY = (value) => {
        const chartHeight = rsiHeight - 15 - 15;
        return 15 + chartHeight - (value / 100) * chartHeight;
      };

      return (
        <div id="quant-charts-wrapper" className="w-full flex flex-col space-y-4">
          <div className="w-full bg-[#070b13] border border-blue-900/30 rounded-lg p-2 relative flex flex-col overflow-hidden">
            <div className="flex items-center justify-between text-[11px] font-mono px-2 mb-2 text-slate-400">
              <div className="flex items-center space-x-2">
                <span className="w-2.5 h-2.5 bg-blue-500 rounded-sm"></span>
                <span className="font-semibold text-slate-200">ESTRUCTURA DE PRECIOS ({symbol})</span>
              </div>
              <div className="flex space-x-3">
                <span className="text-green-400 font-bold">HH / HL = Alcista</span>
                <span className="text-rose-500 font-bold">LH / LL = Bajista</span>
              </div>
            </div>

            <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto select-none" xmlns="http://www.w3.org/2000/svg">
              {/* Grid lines */}
              {[0.25, 0.5, 0.75].map((ratio, i) => {
                const price = boundaries.min + (boundaries.max - boundaries.min) * ratio;
                const y = priceToY(price);
                return (
                  <g key={i}>
                    <line x1={margin.left} y1={y} x2={width - margin.right} y2={y} stroke="#172554" strokeDasharray="2,3" strokeWidth="0.5" />
                    <text x={width - margin.right + 4} y={y + 3} fill="#475569" className="text-[9px] font-mono" textAnchor="start">
                      ${price.toFixed(price > 10 ? 2 : 5)}
                    </text>
                  </g>
                );
              })}

              {/* Candles */}
              {mappedCandles.map((c, idx) => (
                <g key={idx}>
                  <line x1={c.x} y1={c.yHigh} x2={c.x} y2={c.yLow} stroke={c.isUp ? '#22c55e' : '#f43f5e'} strokeWidth="1" />
                  <rect
                    x={c.x - 3}
                    y={c.top}
                    width="6"
                    height={c.height}
                    fill={c.isUp ? '#22c55e' : '#f43f5e'}
                    opacity={0.8}
                  />
                </g>
              ))}

              {/* Peak lines & labels */}
              {peakOverlays.length > 1 && (
                <path
                  d={peakOverlays.reduce((acc, p, idx) => `${acc} ${idx === 0 ? 'M' : 'L'} ${p.cx} ${p.cy}`, '')}
                  fill="none"
                  stroke="#06b6d4"
                  strokeDasharray="3,3"
                  strokeWidth="1.2"
                  opacity={0.7}
                />
              )}

              {peakOverlays.map((peak, idx) => {
                const yOffset = peak.isHigh ? -12 : 12;
                const badgeColor = peak.type.startsWith('H') ? '#22c55e' : '#ef4444';
                return (
                  <g key={idx}>
                    <circle cx={peak.cx} cy={peak.cy} r="4" fill={badgeColor} stroke="#030712" strokeWidth="1.5" />
                    <rect x={peak.cx - 10} y={peak.cy + yOffset - 7} width="20" height="12" rx="2" fill="#0b1329" stroke={badgeColor} strokeWidth="1" />
                    <text x={peak.cx} y={peak.cy + yOffset + 2} fill={badgeColor} className="text-[8px] font-mono font-bold" textAnchor="middle">{peak.type}</text>
                  </g>
                );
              })}
            </svg>
          </div>

          <div className="w-full bg-[#070b13] border border-blue-900/30 rounded-lg p-2 relative flex flex-col overflow-hidden">
            <div className="flex items-center justify-between text-[11px] font-mono px-2 mb-2 text-slate-400">
              <div className="flex items-center space-x-2">
                <span className="w-2.5 h-2.5 bg-cyan-500 rounded-sm"></span>
                <span className="font-semibold text-slate-200">OSCILADOR RSI 14 ({rsi.toFixed(2)})</span>
              </div>
              <div className="flex flex-wrap space-x-2 text-[10px] sm:space-x-3">
                <span class="text-rose-450 font-bold">≥90 VENTA CRÍTICA</span>
                <span class="text-amber-500 font-bold">≥80 VENTA EXTREMA</span>
                <span class="text-emerald-400 font-bold">≤20 COMPRA EXTREMA</span>
                <span class="text-blue-400 font-bold">≤10 COMPRA CRÍTICA</span>
              </div>
            </div>

            <svg viewBox={`0 0 ${width} ${rsiHeight}`} className="w-full h-auto select-none" xmlns="http://www.w3.org/2000/svg">
              {/* Guides */}
              <line x1={margin.left} y1={rsiToY(90)} x2={width - margin.right} y2={rsiToY(90)} stroke="#ec4899" strokeWidth="1" strokeDasharray="3,2" />
              <text x={margin.left - 5} y={rsiToY(90) + 3} fill="#ec4899" className="text-[8px] font-mono text-right" textAnchor="end">90</text>

              <line x1={margin.left} y1={rsiToY(80)} x2={width - margin.right} y2={rsiToY(80)} stroke="#f59e0b" strokeWidth="0.8" strokeDasharray="3,3" />
              <text x={margin.left - 5} y={rsiToY(80) + 3} fill="#f59e0b" className="text-[8px] font-mono text-right" textAnchor="end">80</text>

              <line x1={margin.left} y1={rsiToY(50)} x2={width - margin.right} y2={rsiToY(50)} stroke="#334155" strokeWidth="0.6" />
              <text x={margin.left - 5} y={rsiToY(50) + 3} fill="#475569" className="text-[8px] font-mono text-right" textAnchor="end">50</text>

              <line x1={margin.left} y1={rsiToY(20)} x2={width - margin.right} y2={rsiToY(20)} stroke="#10b981" strokeWidth="0.8" strokeDasharray="3,3" />
              <text x={margin.left - 5} y={rsiToY(20) + 3} fill="#10b981" className="text-[8px] font-mono text-right" textAnchor="end">20</text>

              <line x1={margin.left} y1={rsiToY(10)} x2={width - margin.right} y2={rsiToY(10)} stroke="#3b82f6" strokeWidth="1" strokeDasharray="3,2" />
              <text x={margin.left - 5} y={rsiToY(10) + 3} fill="#3b82f6" className="text-[8px] font-mono text-right" textAnchor="end">10</text>

              <rect x={margin.left} y={rsiToY(80)} width={width - margin.left - margin.right} height={rsiToY(20) - rsiToY(80)} fill="#1e293b" opacity={0.15} />

              {/* RSI trace */}
              {mappedCandles.length > 5 && (
                <path
                  d={mappedCandles.reduce((acc, c, idx) => {
                    const computedRsiVal = idx === mappedCandles.length - 1 ? rsi : (50 + Math.sin(idx * 0.7) * 22 + (idx % 3 === 0 ? 8 : -8));
                    const ry = rsiToY(Math.max(2, Math.min(98, computedRsiVal)));
                    return `${acc} ${idx === 0 ? 'M' : 'L'} ${c.x} ${ry}`;
                  }, '')}
                  fill="none"
                  stroke="#06b6d4"
                  strokeWidth="1.5"
                />
              )}

              {/* Plot tip */}
              {mappedCandles.length > 0 && (
                <g>
                  <circle cx={mappedCandles[mappedCandles.length - 1].x} cy={rsiToY(rsi)} r="4.5" fill={rsi >= 80 ? '#f59e0b' : rsi <= 20 ? '#10b981' : '#06b6d4'} stroke="#030712" strokeWidth="1.5" />
                  <circle cx={mappedCandles[mappedCandles.length - 1].x} cy={rsiToY(rsi)} r="8" fill="none" stroke={rsi >= 80 ? '#f59e0b' : rsi <= 20 ? '#10b981' : '#06b6d4'} strokeWidth="1" class="animate-ping" opacity={0.5} />
                </g>
              )}
            </svg>
          </div>
        </div>
      );
    }


    // --- MAIN RENDER ROOT ---
    function App() {
      const [tokens, setTokens] = useState([]);
      const [activeTokenAddress, setActiveTokenAddress] = useState('');
      const [interval, setIntervalTimeframe] = useState('15m');
      const [connectionState, setConnectionState] = useState('CONNECTED');
      const [audioAlertsEnabled, setAudioAlertsEnabled] = useState(true);

      const [newAddressInput, setNewAddressInput] = useState('');
      const [scanLoading, setScanLoading] = useState(false);
      const [errorMessage, setErrorMessage] = useState('');

      const [renamingTokenAddress, setRenamingTokenAddress] = useState(null);
      const [renamingValue, setRenamingValue] = useState('');

      const [alerts, setAlerts] = useState([]);
      const [signalHistory, setSignalHistory] = useState([]);
      const [latency, setLatency] = useState(24);
      const [lastUpdateStamp, setLastUpdateStamp] = useState('');

      const candlesCacheRef = useRef({});
      const lastStateTriggerRef = useRef({});

      // Loading Initial Preloaded popular coins
      useEffect(() => {
        const savedHistory = localStorage.getItem('SOLANA_QUANT_RSI_HISTORY');
        if (savedHistory) {
          try { setSignalHistory(JSON.parse(savedHistory)); } catch(e) {}
        }
        
        // Populate standard tokens
        const baseline = [
          { symbol: 'SOL', name: 'Wrapped SOL', address: 'So11111111111111111111111111111111111111112', price: 154.50 },
          { symbol: 'JUP', name: 'Jupiter', address: 'JUPyiwrYJGwtXYutA6E96E69ZpzoT2fS7bE6WaJst8L', price: 1.05 },
          { symbol: 'RAY', name: 'Raydium', address: '4k3DyjzvNGe85TZekg276mSt5iRT6A2GDDAOXKPcptFD', price: 1.84 },
          { symbol: 'BONK', name: 'Bonk', address: 'DezXAZ8z7P6ZW8dB579gAL64LYBN6DYckHEQC1t6QCYy', price: 0.000022 },
          { symbol: 'WIF', name: 'dogwifhat', address: 'EKpQGSJojMFZJp6yv2SM6S748P84EAn936E7Lp8mNXT', price: 2.15 },
          { symbol: 'POPCAT', name: 'Popcat', address: '7GCih69fS7L4p4YFR6RBA8MYiTCU99SZSAYERU6itG78', price: 0.88 }
        ];

        const savedTokens = localStorage.getItem('SOLANA_QUANT_RSI_TOKENS');
        let initialList = [];
        
        if (savedTokens) {
          try { initialList = JSON.parse(savedTokens); } catch(e) { initialList = []; }
        }

        if (initialList.length === 0) {
          initialList = baseline.map((item, idx) => {
            const startCandles = generateHistoricCandles(item.price);
            candlesCacheRef.current[item.address] = startCandles;
            const computedRsi = calculateRSI(startCandles.map(c => c.close), 14);
            const structure = calculateMarketStructure(startCandles);

            return {
              address: item.address,
              name: item.name,
              symbol: item.symbol,
              imageUrl: 'https://img.icons8.com/color/48/solana.png',
              price: item.price,
              basePrice: item.price,
              volume24h: 350000000 / (idx + 1),
              liquidity: 95000000 / (idx + 1),
              status: 'active',
              currentRsi: computedRsi,
              lastUpdateTime: new Date().toLocaleTimeString(),
              buyersPercentage: Math.floor(Math.random() * 20) + 40,
              sellersPercentage: 50,
              structure,
              order: idx,
              latencyMs: 15
            };
          });
        } else {
          // Initialize candles cache for stored ones
          initialList.forEach(t => {
            if (!candlesCacheRef.current[t.address]) {
              candlesCacheRef.current[t.address] = generateHistoricCandles(t.price);
            }
          });
        }

        const processed = initialList.map(t => {
          t.sellersPercentage = 100 - t.buyersPercentage;
          return t;
        });

        setTokens(processed);
        if (processed.length > 0) setActiveTokenAddress(processed[0].address);
        setLastUpdateStamp(new Date().toLocaleTimeString());
      }, []);

      // High Frequency Sim loop
      useEffect(() => {
        const timer = setInterval(() => {
          if (tokens.length === 0) return;

          setLatency(prev => {
            const jitter = Math.random() < 0.5 ? -1 : 1;
            return Math.max(12, Math.min(65, prev + jitter));
          });

          const nextList = tokens.map(token => {
            const randomPercent = (Math.random() - 0.495) * 0.003;
            const currentPrice = token.price * (1 + randomPercent);

            let tokenCandles = candlesCacheRef.current[token.address] || [];
            if (tokenCandles.length === 0) {
              tokenCandles = generateHistoricCandles(token.price);
            }

            const lastIdx = tokenCandles.length - 1;
            const activeCandle = { ...tokenCandles[lastIdx] };
            activeCandle.close = currentPrice;
            if (currentPrice > activeCandle.high) activeCandle.high = currentPrice;
            if (currentPrice < activeCandle.low) activeCandle.low = currentPrice;

            const updatedCandles = [...tokenCandles];
            updatedCandles[lastIdx] = activeCandle;

            if (Math.random() < 0.04) {
              updatedCandles.push({
                open: currentPrice,
                high: currentPrice,
                low: currentPrice,
                close: currentPrice,
                time: new Date().toISOString()
              });
              if (updatedCandles.length > 31) updatedCandles.shift();
            }

            candlesCacheRef.current[token.address] = updatedCandles;
            
            const nextRsi = calculateRSI(updatedCandles.map(c => c.close), 14);
            const structure = calculateMarketStructure(updatedCandles);

            let buyersShift = (Math.random() - 0.5) * 2;
            if (nextRsi < 25) buyersShift += 0.4;
            else if (nextRsi > 75) buyersShift -= 0.4;

            const buyersPercentage = Math.max(10, Math.min(90, Math.round(token.buyersPercentage + buyersShift)));
            const sellersPercentage = 100 - buyersPercentage;

            let alertType = null;
            if (nextRsi >= 90) alertType = 'VENTA CRÍTICA';
            else if (nextRsi >= 80) alertType = 'VENTA EXTREMA';
            else if (nextRsi <= 10) alertType = 'COMPRA CRÍTICA';
            else if (nextRsi <= 20) alertType = 'COMPRA EXTREMA';

            const lastState = lastStateTriggerRef.current[token.address] || 'NORMAL';

            if (alertType && lastState !== alertType) {
              if (audioAlertsEnabled) {
                if (alertType.startsWith('COMPRA')) playBuyAlert();
                else playSellAlert();
              }

              const confluence = calculateConfluenceScore(nextRsi, structure.currentTrend, buyersPercentage, structure);
              const newAlert = {
                id: `${token.address}-${Date.now()}`,
                timestamp: new Date().toLocaleTimeString(),
                tokenSymbol: token.symbol,
                tokenAddress: token.address,
                rsiValue: nextRsi,
                type: alertType,
                trend: structure.currentTrend,
                dominance: `C: ${buyersPercentage}% | V: ${sellersPercentage}%`,
                confluenceScore: confluence
              };

              setSignalHistory(prev => {
                const upd = [newAlert, ...prev].slice(0, 150);
                localStorage.setItem('SOLANA_QUANT_RSI_HISTORY', JSON.stringify(upd));
                return upd;
              });

              setAlerts(prev => [newAlert, ...prev].slice(0, 5));
              lastStateTriggerRef.current[token.address] = alertType;
            } else if (!alertType && lastState !== 'NORMAL') {
              lastStateTriggerRef.current[token.address] = 'NORMAL';
            }

            return {
              ...token,
              price: currentPrice,
              currentRsi: nextRsi,
              structure,
              buyersPercentage,
              sellersPercentage,
              lastUpdateTime: new Date().toLocaleTimeString()
            };
          });

          setTokens(nextList);
          localStorage.setItem('SOLANA_QUANT_RSI_TOKENS', JSON.stringify(nextList));
          setLastUpdateStamp(new Date().toLocaleTimeString());
        }, 1500);

        return () => clearInterval(timer);
      }, [tokens, audioAlertsEnabled]);


      // --- ACTIONS ---
      const handleAddNewToken = (e) => {
        e.preventDefault();
        setErrorMessage('');
        const trimmed = newAddressInput.trim();
        if (!trimmed) return;

        if (tokens.length >= 20) {
          setErrorMessage('Límite del Quant Terminal alcanzado (Máximo 20 tokens activos simultáneamente)');
          playErrorChime();
          return;
        }

        const exists = tokens.some(t => t.address.toLowerCase() === trimmed.toLowerCase());
        if (exists) {
          setErrorMessage('Este token ya se encuentra en el panel de monitoreo activo.');
          playErrorChime();
          return;
        }

        // Add mock scanned Solana Spl Token
        const mockPrice = Math.random() * 2 + 0.1;
        const initialCandles = generateHistoricCandles(mockPrice);
        candlesCacheRef.current[trimmed] = initialCandles;

        const closes = initialCandles.map(c => c.close);
        const computedRsi = calculateRSI(closes, 14);
        const structure = calculateMarketStructure(initialCandles);
        const buyersVal = Math.floor(Math.random() * 22) + 39;

        const symbol = 'SPL-' + trimmed.slice(0, 4).toUpperCase();
        const newToken = {
          address: trimmed,
          name: 'Token de Solana Importado',
          symbol: symbol,
          imageUrl: 'https://img.icons8.com/color/48/solana.png',
          price: mockPrice,
          basePrice: mockPrice,
          volume24h: 1250000,
          liquidity: 450000,
          status: 'active',
          currentRsi: computedRsi,
          lastUpdateTime: new Date().toLocaleTimeString(),
          buyersPercentage: buyersVal,
          sellersPercentage: 100 - buyersVal,
          structure,
          order: tokens.length,
          latencyMs: 14
        };

        const updated = [...tokens, newToken];
        setTokens(updated);
        localStorage.setItem('SOLANA_QUANT_RSI_TOKENS', JSON.stringify(updated));
        setActiveTokenAddress(newToken.address);
        setNewAddressInput('');
        playSuccessChime();
      };

      const handleDeleteToken = (address, e) => {
        e.stopPropagation();
        const filtered = tokens.filter(t => t.address !== address);
        const updated = filtered.map((t, idx) => ({ ...t, order: idx }));
        setTokens(updated);
        localStorage.setItem('SOLANA_QUANT_RSI_TOKENS', JSON.stringify(updated));
        if (activeTokenAddress === address && updated.length > 0) {
          setActiveTokenAddress(updated[0].address);
        }
        playSuccessChime();
      };

      const moveTokenUp = (address, e) => {
        e.stopPropagation();
        const index = tokens.findIndex(t => t.address === address);
        if (index === 0) return;
        const updated = [...tokens];
        const temp = updated[index];
        updated[index] = updated[index - 1];
        updated[index - 1] = temp;
        const final = updated.map((t, idx) => ({ ...t, order: idx }));
        setTokens(final);
        localStorage.setItem('SOLANA_QUANT_RSI_TOKENS', JSON.stringify(final));
      };

      const moveTokenDown = (address, e) => {
        e.stopPropagation();
        const index = tokens.findIndex(t => t.address === address);
        if (index === tokens.length - 1) return;
        const updated = [...tokens];
        const temp = updated[index];
        updated[index] = updated[index + 1];
        updated[index + 1] = temp;
        const final = updated.map((t, idx) => ({ ...t, order: idx }));
        setTokens(final);
        localStorage.setItem('SOLANA_QUANT_RSI_TOKENS', JSON.stringify(final));
      };

      const startRenaming = (token, e) => {
        e.stopPropagation();
        setRenamingTokenAddress(token.address);
        setRenamingValue(token.name);
      };

      const saveRename = (address) => {
        if (!renamingValue.trim()) return;
        const updated = tokens.map((t) => {
          if (t.address === address) {
            return { ...t, name: renamingValue.trim() };
          }
          return t;
        });
        setTokens(updated);
        localStorage.setItem('SOLANA_QUANT_RSI_TOKENS', JSON.stringify(updated));
        setRenamingTokenAddress(null);
      };

      const exportHistoryToCSV = () => {
        if (signalHistory.length === 0) return;
        const headers = ['Fecha/Hora', 'Token', 'Dirección Contrato', 'RSI 14', 'Tipo Alerta', 'Estructura', 'Dominancia Compradores', 'Score Confluencia'];
        const rows = signalHistory.map(item => [
          item.timestamp,
          item.tokenSymbol,
          item.tokenAddress,
          item.rsiValue,
          item.type,
          item.trend,
          item.dominance,
          item.confluenceScore
        ]);
        const csvContent = "data:text/csv;charset=utf-8," 
          + [headers.join(','), ...rows.map(e => e.map(val => `"${val}"`).join(","))].join("\n");
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `SOLANA_QUANT_RSI_SIGNALS_${new Date().toISOString().slice(0, 10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const selectedToken = useMemo(() => {
        return tokens.find(t => t.address === activeTokenAddress) || tokens[0] || null;
      }, [tokens, activeTokenAddress]);

      const activeCandles = useMemo(() => {
        if (!selectedToken) return [];
        return candlesCacheRef.current[selectedToken.address] || [];
      }, [selectedToken]);

      const opportunities = useMemo(() => {
        return tokens
          .map((t) => {
            let deviation = Math.abs(t.currentRsi - 50);
            let isOversold = t.currentRsi <= 20;
            let isOverbought = t.currentRsi >= 80;
            let classification = 'NEUTRAL';
            if (t.currentRsi >= 90) classification = 'VENTA CRÍTICA';
            else if (t.currentRsi >= 80) classification = 'VENTA EXTREMA';
            else if (t.currentRsi <= 10) classification = 'COMPRA CRÍTICA';
            else if (t.currentRsi <= 20) classification = 'COMPRA EXTREMA';
            return { ...t, deviation, isExtreme: isOversold || isOverbought, classification };
          })
          .filter(item => item.isExtreme)
          .sort((a, b) => b.deviation - a.deviation);
      }, [tokens]);

      const stats = useMemo(() => {
        const activeCount = tokens.length;
        const extremeBuys = tokens.filter(t => t.currentRsi <= 20).length;
        const extremeSells = tokens.filter(t => t.currentRsi >= 80).length;
        return { activeCount, extremeBuys, extremeSells, activeSignalsCount: extremeBuys + extremeSells };
      }, [tokens]);

      const selectedConfluenceScore = useMemo(() => {
        if (!selectedToken) return 0;
        return calculateConfluenceScore(selectedToken.currentRsi, selectedToken.structure.currentTrend, selectedToken.buyersPercentage, selectedToken.structure);
      }, [selectedToken]);

      const dominantGlobalTrend = useMemo(() => {
        let bullish = 0;
        let bearish = 0;
        tokens.forEach(t => {
          if (t.structure.currentTrend === 'ALCISTA') bullish++;
          if (t.structure.currentTrend === 'BAJISTA') bearish++;
        });
        if (bullish > bearish) return 'ALCISTA';
        if (bearish > bullish) return 'BAJISTA';
        return 'NEUTRAL';
      }, [tokens]);

      return (
        <div class="w-full min-h-screen bg-[#020613] p-3 md:p-6 text-slate-100 flex flex-col font-sans relative antialiased leading-relaxed">
          <div class="absolute inset-0 bg-[radial-gradient(#1e3a8a_1px,transparent_1px)] [background-size:16px_16px] opacity-10 pointer-events-none"></div>

          {/* HEADER */}
          <header class="w-full px-4 md:px-6 mb-5 border-b border-blue-900/40 pb-4 flex flex-col md:flex-row items-center justify-between gap-4 z-10">
            <div class="flex items-center space-x-3">
              <div class="p-2.5 bg-blue-900/20 border border-blue-500/40 rounded-lg shadow-[0_0_15px_rgba(59,130,246,0.2)]">
                <i data-lucide="activity" class="w-7 h-7 text-cyan-400 animate-pulse text-shadow-cyan"></i>
              </div>
              <div>
                <h1 class="text-xl md:text-2xl font-bold font-display tracking-tight bg-gradient-to-r from-cyan-400 via-blue-500 to-pink-500 text-transparent bg-clip-text uppercase">
                  Solana Quant RSI Extreme Scanner
                </h1>
                <p class="text-[10px] font-mono tracking-widest text-blue-400">
                  ALGORITHMIC WORKSTATION • HEDGE FUND PROTOCOL ALPHA
                </p>
              </div>
            </div>

            <div class="flex flex-wrap items-center gap-3">
              <div class="flex items-center space-x-2 bg-blue-950/40 border border-blue-900/50 px-3 py-1.5 rounded-md font-mono text-[11px]">
                <span class="text-slate-400">TENDENCIA GLO-FLOW:</span>
                {dominantGlobalTrend === 'ALCISTA' ? (
                  <span class="text-green-400 flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-green-400 animate-ping"></span>
                    COMPRA FUERTE
                  </span>
                ) : dominantGlobalTrend === 'BAJISTA' ? (
                  <span class="text-rose-500 flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-rose-500 animate-ping"></span>
                    VENTA FUERTE
                  </span>
                ) : (
                  <span class="text-slate-400">INDECISIÓN/RANGO</span>
                )}
              </div>

              <button
                onClick={() => setAudioAlertsEnabled(!audioAlertsEnabled)}
                class={`flex items-center space-x-2 px-3 py-1.5 rounded-md border text-xs font-mono transition-all duration-300 ${
                  audioAlertsEnabled ? 'bg-blue-950/40 border-cyan-500/40 text-cyan-400' : 'bg-slate-900/40 border-slate-800 text-slate-500'
                }`}
              >
                <i data-lucide={audioAlertsEnabled ? "volume-2" : "volume-x"} class="w-4 h-4"></i>
                <span class="hidden sm:inline">SONIDO: {audioAlertsEnabled ? 'ACTIVADO' : 'MUTED'}</span>
              </button>

              <div class="flex items-center space-x-2 bg-blue-950/30 border border-blue-900/50 px-3 py-1.5 rounded-md text-xs font-mono">
                <span class="text-emerald-400 flex items-center gap-1.5">
                  <i data-lucide="wifi" class="w-4 h-4"></i>
                  WS: ON
                </span>
                <span class="text-blue-900 mx-1">|</span>
                <span class="text-slate-400">LATENCY:</span>
                <span class="text-cyan-400">{latency}ms</span>
              </div>
            </div>
          </header>

          {/* GLOBAL TREND BAR */}
          <section class="w-full px-4 md:px-6 mb-4 z-10">
            <div class="relative h-2.5 w-full bg-slate-950 rounded-full overflow-hidden border border-blue-950 flex shadow-inner">
              <div
                className={`h-full transition-all duration-1000 ${
                  dominantGlobalTrend === 'ALCISTA'
                    ? 'w-full bg-gradient-to-r from-emerald-500 via-green-400 to-cyan-400 shadow-[0_0_10px_#22c55e]'
                    : dominantGlobalTrend === 'BAJISTA'
                    ? 'w-full bg-gradient-to-r from-rose-600 via-pink-500 to-pink-400 shadow-[0_0_10px_#f43f5e]'
                    : 'w-full bg-gradient-to-r from-slate-600 via-blue-900 to-slate-600'
                }`}
              />
            </div>
          </section>

          {/* STATS */}
          <section class="w-full px-4 md:px-6 grid grid-cols-2 md:grid-cols-4 gap-3 mb-6 z-10">
            <div class="bg-[#070b13] border border-blue-950 p-3 rounded-lg flex flex-col justify-center">
              <span class="text-[10px] font-mono text-slate-500 tracking-wider">TOKENS LISTADOS</span>
              <div class="flex items-baseline space-x-2">
                <span class="text-xl font-bold font-mono text-cyan-400">{stats.activeCount}</span>
                <span class="text-xs font-mono text-slate-600">/ 20 MAX</span>
              </div>
            </div>

            <div class="bg-[#070b13] border border-blue-950 p-3 rounded-lg flex flex-col justify-center">
              <span class="text-[10px] font-mono text-slate-500 tracking-wider">COMPRA EXTREMA (≤20)</span>
              <div class="flex items-baseline space-x-2">
                <span class="text-xl font-bold font-mono text-green-400">{stats.extremeBuys}</span>
                <span class="text-xs font-mono text-slate-600">PISCINAS</span>
              </div>
            </div>

            <div class="bg-[#070b13] border border-blue-950 p-3 rounded-lg flex flex-col justify-center">
              <span class="text-[10px] font-mono text-slate-500 tracking-wider">VENTA EXTREMA (≥80)</span>
              <div class="flex items-baseline space-x-2">
                <span class="text-xl font-bold font-mono text-amber-500">{stats.extremeSells}</span>
                <span class="text-xs font-mono text-slate-600">PRESIÓN</span>
              </div>
            </div>

            <div class="bg-[#070b13] border border-blue-950 p-3 rounded-lg flex flex-col justify-center">
              <span class="text-[10px] font-mono text-slate-500 tracking-wider">RSI SEÑALES ACTIVAS</span>
              <div class="flex items-baseline space-x-2">
                <span class="text-xl font-bold font-mono text-red-400">{stats.activeSignalsCount}</span>
                <span class="text-[10px] text-slate-400 font-mono">ÚLT. SIG: {lastUpdateStamp}</span>
              </div>
            </div>
          </section>

          {/* GRID */}
          <main class="w-full px-4 md:px-6 grid grid-cols-1 lg:grid-cols-12 gap-5 items-start flex-1 z-10">
            {/* LEFT */}
            <section class="lg:col-span-4 flex flex-col space-y-4">
              {/* Import */}
              <div class="bg-[#060a12] border border-blue-900/30 p-4 rounded-xl glow-blue">
                <h2 class="text-xs font-bold font-mono tracking-wider text-slate-300 uppercase mb-3 flex items-center justify-between">
                  <span>Importar Activo SPL Solana</span>
                  <span class="text-[9px] text-blue-500 font-normal lowercase">Pega Dirección</span>
                </h2>
                <form onSubmit={handleAddNewToken} class="space-y-3">
                  <div class="relative">
                    <input
                      type="text"
                      placeholder="Dirección del contrato SPL..."
                      value={newAddressInput}
                      onChange={(e) => setNewAddressInput(e.target.value)}
                      class="w-full bg-[#03060c] border border-blue-950 rounded-lg px-3 py-2.5 text-xs text-slate-200 placeholder-slate-600 font-mono focus:outline-none focus:border-cyan-500/60 focus:ring-1 focus:ring-cyan-500/40"
                    />
                    <button
                      type="submit"
                      disabled={!newAddressInput}
                      class="absolute right-2 top-2 px-2 py-1 bg-cyan-600 hover:bg-cyan-500 text-black rounded text-[10px] font-bold transition-all disabled:opacity-40"
                    >
                      + ESCANEAR
                    </button>
                  </div>
                  {errorMessage && (
                    <div class="p-2 bg-rose-950/40 border border-rose-900/60 text-rose-300 text-[10px] font-mono rounded">
                      {errorMessage}
                    </div>
                  )}
                </form>
              </div>

              {/* Watcher List */}
              <div class="bg-[#060a12] border border-blue-900/30 p-1.5 rounded-xl flex flex-col">
                <div class="p-3 border-b border-blue-950 flex items-center justify-between">
                  <h2 class="text-xs font-bold font-mono tracking-wider text-slate-300 flex items-center space-x-2">
                    <i data-lucide="layers" class="w-4 h-4 text-cyan-400"></i>
                    <span>MONITOREO ACTIVO ({tokens.length})</span>
                  </h2>
                  <div class="text-[9px] font-mono text-slate-500 bg-blue-950 px-2 py-0.5 rounded">RSI-14</div>
                </div>

                <div class="divide-y divide-blue-950/60 max-h-[500px] overflow-y-auto">
                  {tokens.map((token) => {
                    const isActive = token.address === activeTokenAddress;
                    const rsiColor = token.currentRsi >= 90 ? 'text-pink-500 font-bold' : token.currentRsi >= 80 ? 'text-amber-500' : token.currentRsi <= 10 ? 'text-blue-500 font-bold' : token.currentRsi <= 20 ? 'text-emerald-400' : 'text-slate-400';
                    
                    let triggerLabel = '';
                    if (token.currentRsi >= 90) triggerLabel = 'VENTA CRÍTICA';
                    else if (token.currentRsi >= 80) triggerLabel = 'VENTA';
                    else if (token.currentRsi <= 10) triggerLabel = 'COMPRA CRÍT';
                    else if (token.currentRsi <= 20) triggerLabel = 'COMPRA';

                    return (
                      <div
                        key={token.address}
                        onClick={() => setActiveTokenAddress(token.address)}
                        class={`p-3 transition-all cursor-pointer flex items-center justify-between ${
                          isActive ? 'bg-blue-950/30 border-l-2 border-cyan-400 text-white' : 'hover:bg-blue-950/10 text-slate-400'
                        }`}
                      >
                        <div class="flex items-center space-x-3 truncate">
                          <i data-lucide="coins" class="w-5 h-5 text-slate-400"></i>
                          <div class="truncate flex flex-col">
                            <div class="flex items-center space-x-1">
                              <span class="font-bold text-xs text-slate-100">{token.symbol}</span>
                              <span class="text-[10px] text-slate-500 font-mono truncate max-w-[80px]">{token.name}</span>
                            </div>
                            <span class="text-[9px] font-mono text-slate-500">{token.address.slice(0, 4)}...{token.address.slice(-4)}</span>
                          </div>
                        </div>

                        <div class="flex items-center space-x-2">
                          {triggerLabel && (
                            <span class={`text-[8px] font-bold px-1 py-0.5 rounded ${
                              token.currentRsi >= 80 ? 'bg-rose-950/50 text-rose-300 border border-rose-800' : 'bg-emerald-950/50 text-emerald-300 border border-emerald-800'
                            }`}>
                              {triggerLabel}
                            </span>
                          )}
                          <div class="text-right">
                            <div class="text-[11px] font-mono font-bold text-slate-200">
                              ${token.price > 1 ? token.price.toFixed(3) : token.priceToFixed ? token.priceToFixed(6) : token.price.toFixed(6)}
                            </div>
                            <div class={`text-xs font-mono ${rsiColor}`}>RSI: {token.currentRsi.toFixed(1)}</div>
                          </div>
                          
                          <button onClick={(e) => handleDeleteToken(token.address, e)} class="p-1 text-slate-700 hover:text-red-500">
                            <i data-lucide="trash" class="w-3.5 h-3.5"></i>
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Opportunities Panel */}
              <div class="bg-[#060a12] border border-blue-900/30 p-4 rounded-xl flex flex-col">
                <h2 class="text-xs font-bold font-mono tracking-wider text-amber-500 uppercase mb-3 flex items-center justify-between">
                  <span>Radar de Oportunidades</span>
                  <span class="text-[9px] text-slate-500 font-normal">[FILTRADO POR INTENSIDAD]</span>
                </h2>
                {opportunities.length === 0 ? (
                  <div class="p-4 bg-slate-950/40 border border-blue-950 rounded text-center text-slate-600 text-[11px] font-mono">
                    Ningún token en Solana ha roto los umbrales críticos de RSI en este bloque de simulación.
                  </div>
                ) : (
                  <div class="space-y-2 max-h-[180px] overflow-y-auto">
                    {opportunities.map(opt => (
                      <div key={opt.address} onClick={() => setActiveTokenAddress(opt.address)} class="p-2 bg-[#090f1e] border border-blue-950/60 rounded cursor-pointer hover:border-cyan-500">
                        <div class="flex justify-between text-xs font-mono">
                          <span class="font-bold text-slate-200">{opt.symbol}</span>
                          <span class={opt.currentRsi <= 20 ? 'text-green-400' : 'text-rose-500'}>{opt.classification}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </section>

            {/* RIGHT */}
            <section class="lg:col-span-8 flex flex-col space-y-4">
              
              {/* Toggles */}
              <div class="bg-[#060a12] border border-blue-900/30 p-3 rounded-lg flex flex-col sm:flex-row items-center justify-between gap-3">
                <div class="flex items-center space-x-2">
                  <span class="text-slate-400 font-mono text-xs">TEMPORALIDAD:</span>
                  <div class="flex bg-slate-950 p-0.5 rounded border border-blue-950">
                    {['1m', '5m', '15m', '30m', '1h', '4h'].map(t => (
                      <button
                        key={t}
                        onClick={() => setIntervalTimeframe(t)}
                        class={`px-3 py-1 text-xs font-mono rounded ${
                          interval === t ? 'bg-cyan-600 text-black font-bold' : 'text-slate-400 hover:text-slate-200'
                        }`}
                      >
                        {t}
                      </button>
                    ))}
                  </div>
                </div>
                {selectedToken && (
                  <span class="text-xs font-mono text-slate-400">
                    MONITOREANDO ACTIVAMENTE: <span class="text-cyan-400 font-bold">{selectedToken.symbol}</span>
                  </span>
                )}
              </div>

              {selectedToken ? (
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                  <div class="md:col-span-8 flex flex-col space-y-4">
                    <TradingViewWidget symbol={selectedToken.symbol} interval={interval} />
                    <div class="bg-[#060a12] p-4 rounded-xl shadow-lg border border-blue-900/30">
                      <h4 class="text-xs font-mono tracking-wider text-slate-400 uppercase mb-2">ACCION PRECIO GRÁFICO - {selectedToken.symbol}</h4>
                      <QuantCandleChart candles={activeCandles} structure={selectedToken.structure} symbol={selectedToken.symbol} rsi={selectedToken.currentRsi} />
                    </div>
                  </div>

                  <div class="md:col-span-4 flex flex-col space-y-4">
                    {/* Confluence */}
                    <div class="bg-[#060a12] border border-blue-900/30 p-4 rounded-xl glow-blue flex flex-col items-center">
                      <h3 class="text-xs font-bold font-mono tracking-wider text-slate-400 uppercase mb-4 w-full flex justify-between">
                        <span>CONFLUENCIA CUÁNTICA</span>
                        <span class="text-[9px] bg-slate-950 px-1.5 py-0.5 rounded text-cyan-450">GAUGE</span>
                      </h3>

                      <div class="relative w-36 h-36 flex items-center justify-center">
                        <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                          <circle cx="50" cy="50" r="40" fill="transparent" stroke="#0f172a" stroke-width="6" />
                          <circle
                            cx="50"
                            cy="50"
                            r="40"
                            fill="transparent"
                            stroke={selectedConfluenceScore >= 75 ? '#06b6d4' : selectedConfluenceScore >= 50 ? '#10b981' : '#475569'}
                            stroke-width="7"
                            stroke-dasharray={2 * Math.PI * 40}
                            stroke-dashoffset={2 * Math.PI * 40 * (1 - selectedConfluenceScore / 100)}
                            stroke-linecap="round"
                          />
                        </svg>
                        <div class="absolute flex flex-col items-center">
                          <span class="text-3xl font-bold font-mono text-white">{selectedConfluenceScore}</span>
                          <span class="text-[10px] font-mono text-slate-500 uppercase tracking-widest">/ 100 PCT</span>
                        </div>
                      </div>

                      <div class="text-center mt-3 text-xs">
                        <span class="font-bold text-slate-300">
                          {selectedConfluenceScore >= 75 ? 'ALTA CONFLUENCIA' : selectedConfluenceScore >= 50 ? 'SEÑAL INTEGRADA' : 'ESTADO DE RUIDO'}
                        </span>
                        <p class="text-[9px] text-slate-500 font-mono mt-1">Compilación multivariable de RSI histórico, osciladores de fuerza de compradores y tendencias de picos confirmados.</p>
                      </div>
                    </div>

                    {/* Dominance */}
                    <div class="bg-[#060a12] border border-blue-900/30 p-4 rounded-xl flex flex-col">
                      <h3 class="text-xs font-bold font-mono tracking-wider text-slate-400 uppercase mb-2">PRESIÓN COBRANZA MERCADO</h3>
                      <div class="flex justify-between text-xs font-mono font-bold mb-1">
                        <span class="text-emerald-400">COMPRADORES: {selectedToken.buyersPercentage}%</span>
                        <span class="text-rose-500">VENDEDORES: {selectedToken.sellersPercentage}%</span>
                      </div>
                      <div class="h-2.5 w-full bg-[#03060c] border border-blue-950 rounded-full overflow-hidden flex">
                        <div class="bg-gradient-to-r from-emerald-600 to-green-400 h-full" style={{ width: `${selectedToken.buyersPercentage}%` }} />
                        <div class="bg-gradient-to-r from-rose-500 to-pink-600 h-full" style={{ width: `${selectedToken.sellersPercentage}%` }} />
                      </div>
                      <div class="mt-2 text-[10px] font-mono text-slate-500 flex justify-between">
                        <span>CONTROL:</span>
                        <span class="text-rose-450 text-red-500 font-bold uppercase">LIQUIDACIÓN ACTIVA</span>
                      </div>
                    </div>

                    {/* Structure */}
                    <div class="bg-[#060a12] border border-blue-900/30 p-4 rounded-xl flex flex-col space-y-3">
                      <h3 class="text-xs font-bold font-mono tracking-wider text-slate-400 uppercase">ANÁLISIS ESTRUCTURA SWING</h3>
                      <div class="grid grid-cols-2 gap-2 text-center text-xs font-mono">
                        <div class="bg-[#03060c] border border-blue-950 p-2 rounded">
                          <span class="text-[9px] text-slate-500 block">SWING ALTOS</span>
                          <span class="font-bold text-slate-300">
                            HH: {selectedToken.structure.peaks.filter(p => p.type === 'HH').length} | LH: {selectedToken.structure.peaks.filter(p => p.type === 'LH').length}
                          </span>
                        </div>
                        <div class="bg-[#03060c] border border-blue-950 p-2 rounded">
                          <span class="text-[9px] text-slate-500 block">SWING BAJOS</span>
                          <span class="font-bold text-slate-300">
                            HL: {selectedToken.structure.peaks.filter(p => p.type === 'HL').length} | LL: {selectedToken.structure.peaks.filter(p => p.type === 'LL').length}
                          </span>
                        </div>
                      </div>
                      <div class="p-2 bg-[#03060c] border border-blue-950 text-center rounded font-mono text-[10px]">
                        RESOLUCIÓN DE TENDENCIA
                        <div class="font-bold text-cyan-400 text-xs mt-0.5 uppercase">CANAL {selectedToken.structure.currentTrend}</div>
                      </div>
                    </div>
                  </div>
                </div>
              ) : null}

              {/* Signals History Log */}
              <div class="bg-[#060a12] border border-blue-900/30 p-4 rounded-xl flex flex-col">
                <div class="flex flex-col sm:flex-row items-center justify-between gap-3 mb-4">
                  <h3 class="text-xs font-bold font-mono tracking-wider text-slate-300 uppercase">
                    HISTORIAL GENERAL DE SEÑALES EMITIDAS
                  </h3>
                  <div class="flex space-x-2">
                    <button onClick={exportHistoryToCSV} disabled={signalHistory.length === 0} class="px-3 py-1 bg-blue-950 text-xs font-mono rounded text-slate-300 hover:bg-blue-900 disabled:opacity-40">
                      EXPORTAR CSV
                    </button>
                    <button onClick={() => { setSignalHistory([]); localStorage.removeItem('SOLANA_QUANT_RSI_HISTORY'); }} disabled={signalHistory.length === 0} class="text-xs font-mono text-slate-500 hover:text-red-400 disabled:opacity-40">
                      LIMPIAR
                    </button>
                  </div>
                </div>

                {signalHistory.length === 0 ? (
                  <div class="p-4 bg-[#03060c] text-center text-slate-600 font-mono text-xs rounded">
                    Ninguna señal alarmada en la sesión de trading activa.
                  </div>
                ) : (
                  <div class="overflow-x-auto">
                    <table class="w-full text-left font-mono text-[10px] divide-y divide-blue-950">
                      <tbody class="divide-y divide-blue-950 text-slate-300">
                        {signalHistory.map(h => (
                          <tr key={h.id}>
                            <td class="p-2 text-slate-500">{h.timestamp}</td>
                            <td class="p-2 font-bold text-white">{h.tokenSymbol}</td>
                            <td class="p-2 font-bold text-cyan-400">{h.rsiValue.toFixed(1)}</td>
                            <td class="p-2"><span class="px-1.5 py-0.5 rounded text-[8px] bg-cyan-950/40 text-cyan-400 font-bold">{h.type}</span></td>
                            <td class="p-2">{h.trend}</td>
                            <td class="p-2 text-right text-emerald-400 font-bold">{h.confluenceScore}/100</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </section>
          </main>

          {/* FOOTER */}
          <footer class="w-full px-4 md:px-6 mt-8 border-t border-blue-900/30 pt-4 flex flex-col md:flex-row items-center justify-between text-[11px] font-mono text-slate-500 z-10 gap-3">
            <div>SOLANA QUANT RSI EXTREME SCANNER v4.1 • PROTOCOLO Standalone</div>
            <div class="flex items-center space-x-4">
              <span>ALIMENTADO DE JUPITER & DEXSCREENER APIS</span>
              <span class="text-cyan-500">SECURE STANDALONE WORKSTATION</span>
            </div>
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

    // Load Lucide icons dynamically on window elements load
    setTimeout(() => {
      if (window.lucide) {
        window.lucide.createIcons();
      }
    }, 1200);
  </script>
</body>
</html>
