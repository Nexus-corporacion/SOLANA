    function calculateRSI(candles, period = 14) {
      if (!candles || candles.length <= period) return 50.0;
      
      const sorted = [...candles].sort((a, b) => a.time - b.time);
      const gains = [];
      const losses = [];

      for (let i = 1; i < sorted.length; i++) {
        const diff = sorted[i].close - sorted[i - 1].close;
        if (diff > 0) {
          gains.push(diff);
          losses.push(0);
        } else {
          gains.push(0);
          losses.push(-diff);
        }
      }

      let avgGain = 0;
      let avgLoss = 0;

      for (let i = 0; i < Math.min(period, gains.length); i++) {
        avgGain += gains[i];
        avgLoss += losses[i];
      }

      avgGain /= period;
      avgLoss /= period;

      for (let i = period; i < gains.length; i++) {
        avgGain = (avgGain * (period - 1) + gains[i]) / period;
        avgLoss = (avgLoss * (period - 1) + losses[i]) / period;
      }

      if (avgLoss === 0) {
        return avgGain === 0 ? 50.0 : 100.0;
      }

      const rs = avgGain / avgLoss;
      const computed = 100 - (100 / (1 + rs));
      return isNaN(computed) ? 50.0 : Math.round(computed * 10) / 10;
    }

    function identifyFractals(candles) {
      const highs = [];
      const lows = [];
      const n = 2; 
      const sorted = [...candles].sort((a, b) => a.time - b.time);

      for (let i = n; i < sorted.length - n; i++) {
        let isHigh = true;
        let isLow = true;

        for (let j = -n; j <= n; j++) {
          if (j === 0) continue;
          if (sorted[i].high < sorted[i + j].high) isHigh = false;
          if (sorted[i].low > sorted[i + j].low) isLow = false;
        }

        if (isHigh) {
          highs.push({ price: sorted[i].high, time: sorted[i].time });
        }
        if (isLow) {
          lows.push({ price: sorted[i].low, time: sorted[i].time });
        }
      }

      return { highs, lows };
    }

    function determineTrend(highs, lows) {
      if (highs.length < 2 || lows.length < 2) return 'LATERAL';

      const lastH = highs[highs.length - 1].price;
      const prevH = highs[highs.length - 2].price;
      const lastL = lows[lows.length - 1].price;
      const prevL = lows[lows.length - 2].price;

      if (lastH > prevH && lastL > prevL) return 'BULLISH';
      if (lastH < prevH && lastL < prevL) return 'BEARISH';
      return 'LATERAL';
    }

    function updateCandleSeries(candles, newPrice, timeframeSecs) {
      if (!candles || candles.length === 0) {
        return [{ time: Math.floor(Date.now() / 1000), open: newPrice, high: newPrice, low: newPrice, close: newPrice }];
      }
      const series = [...candles];
      const last = { ...series[series.length - 1] };
      const now = Math.floor(Date.now() / 1000);

      if (now - last.time >= timeframeSecs) {
        series.push({
          time: last.time + timeframeSecs,
          open: last.close,
          high: newPrice,
          low: newPrice,
          close: newPrice
        });
        if (series.length > 100) {
          series.shift();
        }
      } else {
        last.close = newPrice;
        if (newPrice > last.high) last.high = newPrice;
        if (newPrice < last.low) last.low = newPrice;
        series[series.length - 1] = last;
      }
      return series;
    }

    function generateDeterministicCandles(basePrice, address, granularitySeconds, count = 60) {
      let seed = 0;
      for (let i = 0; i < address.length; i++) {
        seed += address.charCodeAt(i);
      }
      
      function seededRand() {
        seed = (seed * 9301 + 49297) % 233280;
        return seed / 233280;
      }
      
      const candles = [];
      const nowEpoch = Math.floor(Date.now() / 1000);
      let currentPrice = basePrice;
      
      for (let i = 0; i < count; i++) {
        const time = nowEpoch - (count - 1 - i) * granularitySeconds;
        const changePercent = (seededRand() - 0.495) * 0.04; 
        const open = currentPrice / (1 + changePercent);
        const close = currentPrice;
        const high = Math.max(open, close) * (1 + seededRand() * 0.015);
        const low = Math.min(open, close) * (1 - seededRand() * 0.015);
        
        candles.push({ time, open, high, low, close });
        currentPrice = open;
      }
      return candles;
    }

    function parseAndExtractAddresses(text) {
      const solregex = /[1-9A-HJ-NP-Za-km-z]{32,44}/g;
      const matches = text.match(solregex) || [];
      const unique = Array.from(new Set(matches));
      return unique.filter(addr => {
        const isHeaderField = /^(Type|List|Color|Address|Chain|Watchlist|Name|Id|solana)$/i.test(addr);
        return !isHeaderField && addr.length >= 32;
      });
    }

    function playSyntheticTone(type) {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;

        const audioCtx = new AudioContextClass();
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (type === 'buy') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(840, audioCtx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1260, audioCtx.currentTime + 0.15);
          gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
          gainNode.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        } else if (type === 'sell') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(320, audioCtx.currentTime);
          osc.frequency.linearRampToValueAtTime(220, audioCtx.currentTime + 0.2);
          gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
          gainNode.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);
        } else {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(440, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
          gainNode.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        }

        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
      } catch (err) {}
    }

    function SniperChart({ token, timeframe, onTimeframeChange, connectionStatus }) {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas || !token) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 500, 240);

        const list = timeframe === 'm5' ? token.candlesM5 : timeframe === 'm15' ? token.candlesM15 : token.candlesH1;
        if(!list || list.length === 0) return;

        let maxPrice = -Infinity, minPrice = Infinity;
        list.forEach(c => {
          if(c.high > maxPrice) maxPrice = c.high;
          if(c.low < minPrice) minPrice = c.low;
        });

        const r = maxPrice - minPrice || 0.01;
        const getY = (p) => 210 - ((p - minPrice) / r) * 180;
        const getX = (idx) => 15 + (idx / (list.length - 1)) * 420;

        ctx.strokeStyle = '#1e293b';
        ctx.beginPath();
        for(let i=0; i<6; i++) {
          const y = 30 + i * 36;
          ctx.moveTo(10, y); ctx.lineTo(440, y);
        }
        ctx.stroke();

        list.forEach((c, idx) => {
          const x = getX(idx);
          const yOpen = getY(c.open);
          const yClose = getY(c.close);
          const yHigh = getY(c.high);
          const yLow = getY(c.low);

          ctx.strokeStyle = c.close >= c.open ? '#10b981' : '#f43f5e';
          ctx.beginPath(); ctx.moveTo(x, yHigh); ctx.lineTo(x, yLow); ctx.stroke();
          ctx.fillRect(x - 2, Math.min(yOpen, yClose), 4, Math.max(1, Math.abs(yClose - yOpen)));
        });
      }, [token, timeframe]);

      if(!token) return <div className="bg-[#0b0f19] p-6 rounded-xl text-center text-xs font-mono text-slate-500 min-h-[300px]">SELECCIONA UN CONTRATO</div>;

      return (
        <div className="bg-[#0b0f19] p-4 rounded-xl border border-[#1e293b]/70 flex-1 flex flex-col">
          <div className="flex justify-between items-center mb-3">
            <span className="font-mono text-sm font-bold text-[#f4d068]">{token.symbol}</span>
            <div className="flex gap-1 bg-[#030712] p-1 rounded border border-[#1e293b]">
              {['m5','m15','h1'].map(tf => (
                <button key={tf} onClick={()=>onTimeframeChange(tf)} className={`px-2 py-0.5 rounded text-[9px] font-mono ${timeframe === tf ? 'bg-[#d4af37] text-black' : 'text-slate-400'}`}>
                  {tf.toUpperCase()}
                </button>
              ))}
            </div>
          </div>
          <canvas ref={canvasRef} width="460" height="240" className="w-full bg-[#030712] border border-[#1e293b] rounded-lg" />
        </div>
      );
    }

    function RsiRadar({ tokens, activeAddress, onSelectToken }) {
      const containerRef = useRef(null);

      useEffect(() => {
        if(!containerRef.current) return;
        const width = 280, height = 220;
        d3.select(containerRef.current).selectAll('*').remove();

        const svg = d3.select(containerRef.current)
          .append('svg')
          .attr('width', '100%')
          .attr('height', '100%')
          .attr('viewBox', `0 0 ${width} ${height}`);

        svg.append('circle').attr('cx', width/2).attr('cy', height/2).attr('r', 15).attr('fill', 'none').attr('stroke', '#1e293b').attr('stroke-dasharray', '2,4');
        svg.append('circle').attr('cx', width/2).attr('cy', height/2).attr('r', 50).attr('fill', 'none').attr('stroke', '#1e293b');
        svg.append('circle').attr('cx', width/2).attr('cy', height/2).attr('r', 90).attr('fill', 'none').attr('stroke', 'rgba(212,175,55,0.15)');

        const dataNodes = tokens.map(t => ({
          address: t.address,
          symbol: t.symbol,
          rsi: t.rsi || 50,
          isActive: t.address === activeAddress
        }));

        const simulation = d3.forceSimulation(dataNodes)
          .force('center', d3.forceCenter(width/2, height/2))
          .force('collision', d3.forceCollide().radius(22))
          .force('radial', d3.forceRadial(d => {
            const dev = Math.abs(d.rsi - 50);
            return dev <= 5 ? 10 : 30 + (dev/50) * 60;
          }, width/2, height/2).strength(0.85));

        const node = svg.selectAll('.node')
          .data(dataNodes)
          .enter()
          .append('g')
          .attr('class', 'node')
          .on('click', (e, d) => onSelectToken(d.address));

        node.append('circle')
          .attr('r', 16)
          .attr('fill', d => d.rsi <= 35 ? 'rgba(16, 185, 129, 0.4)' : d.rsi >= 65 ? 'rgba(244, 63, 94, 0.4)' : '#1e293b')
          .attr('stroke', d => d.isActive ? '#d4af37' : '#030712')
          .attr('stroke-width', d => d.isActive ? 2 : 1);

        node.append('text')
          .attr('text-anchor', 'middle')
          .attr('y', 3)
          .attr('fill', '#fff')
          .style('font-size', '8px')
          .style('font-family', 'monospace')
          .text(d => d.symbol);

        simulation.on('tick', () => {
          node.attr('transform', d => `translate(${Math.max(20, Math.min(width-20, d.x))}, ${Math.max(20, Math.min(height-20, d.y))})`);
        });

        return () => simulation.stop();
      }, [tokens, activeAddress]);

      return (
        <div className="bg-[#0b0f19] rounded-xl border border-[#1e293b]/70 flex flex-col overflow-hidden flex-1 min-h-[260px]">
          <div className="px-4 py-2 border-b border-[#1e293b]/50 select-none">
            <span className="text-[10px] font-mono text-[#f4d068] font-bold">RSI RADAR GEOMÉTRICO (D3)</span>
          </div>
          <div ref={containerRef} className="flex-grow bg-[#030712]/35" />
        </div>
      );
    }

      const [timeframe, setTimeframe] = useState('m15');
      const [soundEnabled, setSoundEnabled] = useState(false);

      const addToken = async (ca) => {
        try {
          const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${ca}`);
          if(!res.ok) return false;
          const data = await res.json();
          const best = data.pairs?.[0];
          if(!best) return false;

          const price = parseFloat(best.priceUsd);
          const fresh = {
            address: best.baseToken.address,
            symbol: best.baseToken.symbol,
            name: best.baseToken.name,
            price, change24h: best.priceChange?.h24 || 0,
            rsi: 48 + Math.random() * 4, score: 50,
            candlesM5: generateDeterministicCandles(price, best.baseToken.address, 300),
            candlesM15: generateDeterministicCandles(price, best.baseToken.address, 900),
            candlesH1: generateDeterministicCandles(price, best.baseToken.address, 3600)
          };

          setTokens(p => [fresh, ...p]);
          setActiveAddress(fresh.address);
          return true;
        } catch(e) { return false; }
      };

      const handleAddMultiple = (cas) => {
        cas.forEach(c => addToken(c));
      };

      const activeToken = tokens.find(t => t.address === activeAddress) || tokens[0] || null;

      return (
        <div className="min-h-screen flex flex-col bg-[#02050c] text-slate-100">
          <TopBar connectionStatus="DEXSCREENER" soundEnabled={soundEnabled} onToggleSound={()=>setSoundEnabled(!soundEnabled)} tokenCount={tokens.length} />
          <main className="flex-grow p-4 grid grid-cols-1 lg:grid-cols-12 gap-4 h-[calc(100vh-80px)] overflow-hidden">
            <div className="lg:col-span-4 flex flex-col gap-4 overflow-y-auto pr-1">
              <Watchlist tokens={tokens} activeAddress={activeAddress} onSelectToken={setActiveAddress} onAddToken={addToken} onAddMultipleTokens={handleAddMultiple} onDeleteToken={(addr)=>setTokens(p=>p.filter(t=>t.address!==addr))} onClearWatchlist={()=>setTokens([])} onLoadDemo={()=>DEMO_LIST.forEach(m => addToken(m.ca))} />
              {tokens.length > 0 && <QuantumPulse activeToken={activeToken} />}
            </div>
            <div className="lg:col-span-5 flex flex-col gap-4 overflow-y-auto">
              <SniperChart token={activeToken} timeframe={timeframe} onTimeframeChange={setTimeframe} connectionStatus="DEXSCREENER" />
            </div>
            <div className="lg:col-span-3 flex flex-col gap-4 overflow-y-auto pl-1">
              <RsiRadar tokens={tokens} activeAddress={activeAddress} onSelectToken={setActiveAddress} />
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('standalone-root')).render(<StandaloneDashboard />);
  </script>
</body>
</html>
