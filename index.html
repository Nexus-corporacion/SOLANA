  <!-- React code starts here -->
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // Web Audio Synthesizer helper
    let audioCtx = null;
    function playSound(type, audioOn) {
      if (!audioOn) return;
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        const now = audioCtx.currentTime;

        if (type === 'click') {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(800, now);
          osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
          gain.gain.setValueAtTime(0.04, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + 0.05);
        } 
        else if (type === 'select') {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(440, now);
          osc.frequency.setValueAtTime(880, now + 0.08);
          gain.gain.setValueAtTime(0.06, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + 0.25);
        }
        else if (type === 'alert') {
          const osc1 = audioCtx.createOscillator();
          const osc2 = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          
          osc1.type = 'sawtooth';
          osc1.frequency.setValueAtTime(950, now);
          osc1.frequency.linearRampToValueAtTime(1200, now + 0.15);
          osc1.frequency.linearRampToValueAtTime(800, now + 0.3);
          
          osc2.type = 'sine';
          osc2.frequency.setValueAtTime(475, now);
          osc2.frequency.linearRampToValueAtTime(600, now + 0.15);
          
          gain.gain.setValueAtTime(0.05, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
          
          osc1.connect(gain);
          osc2.connect(gain);
          gain.connect(audioCtx.destination);
          
          osc1.start(now);
          osc2.start(now);
          
          osc1.stop(now + 0.4);
          osc2.stop(now + 0.4);
        }
        else if (type === 'success') {
          const freqs = [523.25, 659.25, 783.99, 1046.50];
          freqs.forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(f, now + i * 0.05);
            gain.gain.setValueAtTime(0.03, now + i * 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.05 + 0.25);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now + i * 0.05);
            osc.stop(now + i * 0.05 + 0.25);
          });
        }
        else if (type === 'reconnect') {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(150, now);
          osc.frequency.exponentialRampToValueAtTime(600, now + 0.4);
          gain.gain.setValueAtTime(0.04, now);
          gain.gain.linearRampToValueAtTime(0.04, now + 0.3);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(now);
          osc.stop(now + 0.4);
        }
      } catch (e) {
        console.warn('Audio Context error: ', e);
      }
    }

    // Default Seed Data
    const INITIAL_TOKENS = [
      { id: 'spcx', symbol: 'SPCX', name: 'SpaceX Token', price: 0.001758, decimals: 6, rsi: 33.5, volume24h: 3450000, momentum: -35, priority: 'ALTA', points: 20, priceChange24h: -3.31, buyPressure: 58, s1: 0.001700, s2: 0.001650, r1: 0.001850, r2: 0.001920 },
      { id: 'cia', symbol: 'CIA', name: 'Intelligence Ledger', price: 0.0892, decimals: 4, rsi: 78.2, volume24h: 890300, momentum: 62, priority: 'ALTA', points: 35, priceChange24h: 12.45, buyPressure: 72, s1: 0.0820, s2: 0.0780, r1: 0.0910, r2: 0.0950 },
      { id: 'boblax', symbol: 'BOBLAX', name: 'Bob-Lax Matrix', price: 1.425, decimals: 3, rsi: 21.8, volume24h: 12500000, momentum: -82, priority: 'CRÍTICA', points: 85, priceChange24h: -15.2, buyPressure: 38, s1: 1.380, s2: 1.250, r1: 1.550, r2: 1.680 },
      { id: 'gym', symbol: 'GYM', name: 'Pump Gym Chain', price: 0.01245, decimals: 5, rsi: 59.1, volume24h: 2310000, momentum: 12, priority: 'BAJA', points: 15, priceChange24h: 0.85, buyPressure: 51, s1: 0.01180, s2: 0.01100, r1: 0.01310, r2: 0.01380 },
      { id: 'guardian', symbol: 'GUARDIAN', name: 'Sentinel Network', price: 432.50, decimals: 2, rsi: 92.4, volume24h: 42100000, momentum: 94, priority: 'CRÍTICA', points: 95, priceChange24h: 28.4, buyPressure: 88, s1: 410.00, s2: 380.00, r1: 445.00, r2: 460.00 },
      { id: 'folkcat', symbol: 'FOLKCAT', name: 'Folk Cat Meme', price: 0.000452, decimals: 6, rsi: 87.1, volume24h: 920000, momentum: 74, priority: 'ALTA', points: 50, priceChange24h: 18.9, buyPressure: 79, s1: 0.000410, s2: 0.000380, r1: 0.000465, r2: 0.000490 },
      { id: 'kins', symbol: 'KINS', name: 'Kinsmen Protocol', price: 0.942, decimals: 3, rsi: 82.3, volume24h: 1820000, momentum: 55, priority: 'MEDIA', points: 40, priceChange24h: 5.61, buyPressure: 61, s1: 0.900, s2: 0.850, r1: 0.980, r2: 1.050 }
    ];

    const STREAMING_ALERTS = [
      { id: 'ev-1', tokenSymbol: 'SPCX', type: 'CONFIRMACION', message: 'Señal de entrada validada | Estructura de compra formada', minutesAgo: 4, intensity: 'high' },
      { id: 'ev-2', tokenSymbol: 'SPCX', type: 'RSI_EXTREMO', message: 'RSI entra en sobreventa (<30) | RSI registrado en 29.5', minutesAgo: 7, intensity: 'critical' },
      { id: 'ev-3', tokenSymbol: 'SPCX', type: 'CONFIRMACION', message: 'Incremento de compradores | Compradores superan el 60%', minutesAgo: 11, intensity: 'normal' },
      { id: 'ev-4', tokenSymbol: 'GUARDIAN', type: 'RSI_EXTREMO', message: 'Sobrecompra extrema detectada | RSI superior a 92', minutesAgo: 2, intensity: 'critical' },
      { id: 'ev-5', tokenSymbol: 'GUARDIAN', type: 'RES_RUPTURA', message: 'Ruptura de Resistencia R1 Principal superada', minutesAgo: 5, intensity: 'high' }
    ];

    function generateCandles(token, count = 40) {
      let currentPrice = token.price * 0.95;
      let currentRsi = token.rsi;
      const candles = [];
      const now = new Date();
      for (let i = count; i > 0; i--) {
        const timeStr = new Date(now.getTime() - i * 5 * 60 * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        const changePercent = (Math.random() - 0.49) * 0.015;
        const closePrice = currentPrice * (1 + changePercent);
        const highPrice = Math.max(currentPrice, closePrice) * (1 + Math.random() * 0.008);
        const lowPrice = Math.min(currentPrice, closePrice) * (1 - Math.random() * 0.008);
        
        currentRsi = Math.min(99, Math.max(1, currentRsi + (changePercent * 2000) + (Math.random() * 4 - 2)));
        candles.push({
          time: timeStr,
          open: Number(currentPrice.toFixed(token.decimals + 2)),
          high: Number(highPrice.toFixed(token.decimals + 2)),
          low: Number(lowPrice.toFixed(token.decimals + 2)),
          close: Number(closePrice.toFixed(token.decimals + 2)),
          volume: Math.floor(token.volume24h / 288 * (0.5 + Math.random())),
          rsi: Number(currentRsi.toFixed(1))
        });
        currentPrice = closePrice;
      }
      return candles;
    }

    function App() {
      const [tokens, setTokens] = useState(INITIAL_TOKENS);
      const [selectedToken, setSelectedToken] = useState(INITIAL_TOKENS[0]);
      const [audioOn, setAudioOn] = useState(true);
      const [connectionStatus, setConnectionStatus] = useState('BIRDEYE LIVE');
      const [events, setEvents] = useState(STREAMING_ALERTS);
      const [timeframe, setTimeframe] = useState('M5');
      const [currentTime, setCurrentTime] = useState('');
      const [candles, setCandles] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');

      // Manual add state parameters
      const [newSymbol, setNewSymbol] = useState('');
      const [newName, setNewName] = useState('');
      const [newPrice, setNewPrice] = useState('1.0');
      const [newRsi, setNewRsi] = useState('50');
      const [showAddForm, setShowAddForm] = useState(false);

      useEffect(() => {
        const clockTimer = setInterval(() => {
          const now = new Date();
          const yyyy = now.getUTCFullYear();
          const mm = String(now.getUTCMonth() + 1).padStart(2, '0');
          const dd = String(now.getUTCDate()).padStart(2, '0');
          const hh = String(now.getUTCHours()).padStart(2, '0');
          const min = String(now.getUTCMinutes()).padStart(2, '0');
          const ss = String(now.getUTCSeconds()).padStart(2, '0');
          setCurrentTime(`${yyyy}-${mm}-${dd} ${hh}:${min}:${ss} UTC`);
        }, 1000);
        return () => clearInterval(clockTimer);
      }, []);

      // Set initial candles
      useEffect(() => {
        if (selectedToken) {
          setCandles(generateCandles(selectedToken, 40));
        }
      }, [selectedToken?.id]);

      // Simulation Loop
      useEffect(() => {
        let tick = 0;
        const simTimer = setInterval(() => {
          tick++;
          
          // Move status around
          if (tick % 15 === 0) {
            setConnectionStatus('RECONECTANDO');
            playSound('reconnect', audioOn);
            setTimeout(() => setConnectionStatus('FAILOVER ACTIVO'), 2000);
          } else if (tick % 25 === 0) {
            setConnectionStatus('BIRDEYE LIVE');
            playSound('success', audioOn);
          }

          // Random updates
          setTokens(prev => prev.map(t => {
            const change = (Math.random() - 0.495) * 0.016;
            const nextPrice = Math.max(0.00001, t.price * (1 + change));
            let nextRsi = Math.min(98, Math.max(2, t.rsi + (change * 700) + (Math.random() * 2 - 1)));
            const points = Math.round(Math.abs(nextRsi - 50) * (nextRsi < 30 || nextRsi > 70 ? 2 : 1.2));
            
            return {
              ...t,
              price: nextPrice,
              rsi: nextRsi,
              points,
              priceChange24h: Number((t.priceChange24h + change * 100).toFixed(2))
            };
          }));
        }, 3000);

        return () => clearInterval(simTimer);
      }, [audioOn]);

      // Connect updated variables to active chart
      useEffect(() => {
        if (selectedToken) {
          const updated = tokens.find(t => t.id === selectedToken.id);
          if (updated) {
            setSelectedToken(updated);
            setCandles(prev => {
              if (prev.length === 0) return prev;
              const next = [...prev];
              next[next.length - 1] = {
                ...next[next.length - 1],
                close: updated.price,
                high: Math.max(next[next.length - 1].high, updated.price),
                low: Math.min(next[next.length - 1].low, updated.price),
                rsi: Number(updated.rsi.toFixed(1))
              }
              return next;
            });
          }
        }
      }, [tokens]);

      const handleAddToken = (e) => {
        e.preventDefault();
        if (!newSymbol) return;
        const sym = newSymbol.toUpperCase();
        const priceVal = parseFloat(newPrice) || 1.1;
        const rsiVal = parseFloat(newRsi) || 50;

        const brandNew = {
          id: sym.toLowerCase(),
          symbol: sym,
          name: newName || `${sym} Token`,
          price: priceVal,
          rsi: rsiVal,
          decimals: priceVal > 100 ? 2 : 4,
          volume24h: 3500000,
          momentum: Math.round((rsiVal - 50) * 2),
          priority: rsiVal < 30 || rsiVal > 70 ? 'CRÍTICA' : 'ALTA',
          points: 40,
          priceChange24h: 2.50,
          buyPressure: Math.round(rsiVal * 0.8 + 10),
          s1: priceVal * 0.94,
          s2: priceVal * 0.88,
          r1: priceVal * 1.06,
          r2: priceVal * 1.12
        };

        setTokens(prev => [brandNew, ...prev]);
        setSelectedToken(brandNew);
        playSound('success', audioOn);

        setNewSymbol('');
        setNewName('');
        setShowAddForm(false);
      };

      const filteredList = tokens.filter(t => t.symbol.toLowerCase().includes(searchQuery.toLowerCase()));

      return (
        <div className="h-screen w-screen bg-slate-950 text-slate-100 flex flex-col font-sans">
          
          {/* HEADER BAR */}
          <header className="flex items-center justify-between px-5 py-3 border-b border-blue-900/45 bg-slate-950">
            <div className="flex items-center gap-3">
              <div className="w-8 h-8 rounded bg-yellow-500/10 border border-yellow-500/50 flex items-center justify-center text-yellow-500 font-bold">🎯</div>
              <div>
                <div className="flex items-center gap-1.5">
                  <span className="font-mono text-base font-black text-yellow-500">TOKEN SNIPER DISPARADOR</span>
                  <span className="text-[9px] bg-yellow-500 text-slate-950 font-bold px-1 rounded">V5.2</span>
                </div>
                <span className="block text-[9px] tracking-wider text-slate-400 font-mono">STANDALONE WEB ENGINE</span>
              </div>
            </div>

            <div className="flex items-center gap-3 font-mono text-xs">
              <span className="text-emerald-400 bg-emerald-500/10 px-2 py-1 border border-emerald-500/20 rounded font-bold">
                {connectionStatus}
              </span>
              <button 
                onClick={() => setAudioOn(!audioOn)}
                className={`px-2 py-1 border rounded transition-colors ${audioOn ? 'border-yellow-500/40 text-yellow-400 bg-yellow-500/5' : 'border-slate-800 text-slate-500'}`}
              >
                {audioOn ? '🔈 AUDIO ON' : '🔇 AUDIO OFF'}
              </button>
              <div className="text-right">
                <span className="text-slate-300 font-bold block">{currentTime || 'UTC LOADING...'}</span>
                <span className="text-[8px] text-emerald-400 block tracking-widest">SISTEMA SIMULADOR ACTIVO</span>
              </div>
            </div>
          </header>

          {/* GRID PANETS MATCHING 100% SCREEN */}
          <main className="flex-1 min-h-0 grid grid-cols-12 gap-3 p-3 bg-slate-950">
            
            {/* LEFT ROW: Watchlist */}
            <div className="col-span-3 flex flex-col gap-3 min-h-0 bg-slate-900/30 border border-blue-900/20 rounded-xl p-3">
              <div className="flex items-center justify-between border-b border-slate-800 pb-1.5">
                <span className="text-xs font-mono font-black text-slate-300">INDEXADOR SOLANA</span>
                <button 
                  onClick={() => { playSound('click', audioOn); setShowAddForm(!showAddForm); }}
                  className="px-1.5 py-0.5 text-[10px] bg-yellow-500 hover:bg-yellow-400 text-slate-950 font-bold rounded"
                >
                  Agregar Token (+)
                </button>
              </div>

              {showAddForm && (
                <form onSubmit={handleAddToken} className="p-2 border border-yellow-500/20 bg-slate-900 rounded-lg space-y-1.5">
                  <input type="text" required placeholder="SYMBOL" value={newSymbol} onChange={e=>setNewSymbol(e.target.value)} className="w-full bg-slate-950 text-slate-200 border border-slate-800 p-1 text-xs rounded" />
                  <input type="text" placeholder="NAME" value={newName} onChange={e=>setNewName(e.target.value)} className="w-full bg-slate-950 text-slate-200 border border-slate-800 p-1 text-xs rounded" />
                  <div className="grid grid-cols-2 gap-1.5">
                    <input type="number" placeholder="PRICE" step="any" value={newPrice} onChange={e=>setNewPrice(e.target.value)} className="w-full bg-slate-950 text-slate-200 border border-slate-800 p-1 text-xs rounded" />
                    <input type="number" placeholder="RSI" value={newRsi} onChange={e=>setNewRsi(e.target.value)} className="w-full bg-slate-950 text-slate-200 border border-slate-800 p-1 text-xs rounded" />
                  </div>
                  <button type="submit" className="w-full py-1 text-xs font-bold bg-yellow-500 text-slate-950 rounded">INDEXAR</button>
                </form>
              )}

              <input 
                type="text" 
                placeholder="Filtro rápido..." 
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
                className="w-full bg-slate-950 border border-slate-800 p-1.5 text-xs rounded font-mono text-slate-200 focus:outline-none" 
              />

              <div className="flex-1 overflow-y-auto space-y-1.5 scrollbar-thin">
                {filteredList.map(t => {
                  const isS = t.id === selectedToken?.id;
                  return (
                    <div 
                      key={t.id}
                      onClick={() => { playSound('select', audioOn); setSelectedToken(t); }} 
                      className={`p-2 border rounded-lg cursor-pointer flex items-center justify-between hover:bg-slate-900/60 ${isS ? 'border-yellow-500 bg-blue-950/20' : 'border-slate-800 bg-slate-950/50'}`}
                    >
                      <div>
                        <span className="font-mono text-xs font-bold block text-slate-200">{t.symbol}</span>
                        <span className="text-[9px] text-slate-500">{t.name}</span>
                      </div>
                      <div className="text-right">
                        <span className="text-xs font-mono font-bold block">${t.price.toLocaleString(undefined, {maximumFractionDigits: t.decimals})}</span>
                        <span className={`text-[10px] font-mono font-bold px-1 rounded ${t.rsi <= 30 ? 'bg-emerald-500/10 text-emerald-400' : t.rsi >= 70 ? 'bg-rose-500/10 text-rose-400' : 'bg-slate-800'}`}>
                          RSI: {t.rsi.toFixed(0)}
                        </span>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* MIDDLE ROW: Candle chart & logs */}
            <div className="col-span-6 flex flex-col gap-3 min-h-0">
              
              {/* Dynamic chart canvas */}
              <div className="flex-1 min-h-0 bg-slate-900/30 border border-blue-900/20 rounded-xl p-3 flex flex-col">
                <div className="flex items-center justify-between border-b border-slate-800 pb-1.5">
                  <span className="text-xs font-mono font-black text-yellow-500">{selectedToken?.symbol} chart</span>
                  <div className="flex gap-1">
                    {['M5', 'M15', 'H1'].map(tf => (
                      <button key={tf} onClick={() => { playSound('click', audioOn); setTimeframe(tf); }} className={`px-2 py-0.5 text-[9px] font-mono font-bold rounded ${timeframe === tf ? 'bg-yellow-500 text-slate-950' : 'text-slate-400 bg-slate-900'}`}>{tf}</button>
                    ))}
                  </div>
                </div>

                {/* SVG candle elements */}
                <div className="flex-1 mt-2 relative min-h-0">
                  <svg className="w-full h-full min-h-[180px]">
                    {/* Render random candle models lines */}
                    {candles.map((c, idx) => {
                      const spacing = 12;
                      const x = 30 + idx * spacing;
                      const min = Math.min(...candles.map(c => c.low));
                      const max = Math.max(...candles.map(c => c.high));
                      const range = max - min || 1;
                      
                      const getY = (val) => 180 - ((val - min) / range) * 140;
                      
                      const yOpen = getY(c.open);
                      const yClose = getY(c.close);
                      const yHigh = getY(c.high);
                      const yLow = getY(c.low);
                      const isUp = c.close >= c.open;

                      return (
                        <g key={idx}>
                          <line x1={x} y1={yHigh} x2={x} y2={yLow} stroke={isUp ? '#10b981' : '#f43f5e'} strokeWidth={1} />
                          <rect x={x - 3} y={Math.min(yOpen, yClose)} width={6} height={Math.max(2, Math.abs(yOpen - yClose))} fill={isUp ? '#064e3b' : '#4c0519'} stroke={isUp ? '#10b981' : '#f43f5e'} strokeWidth={1} />
                        </g>
                      );
                    })}
                  </svg>
                </div>
              </div>

              {/* Chronological signals events logger */}
              <div className="h-[140px] shrink-0 bg-slate-900/30 border border-blue-900/20 rounded-xl p-3 flex flex-col">
                <span className="text-xs font-mono font-black text-slate-400 border-b border-slate-800 pb-1 flex items-center justify-between">
                  <span>TIMELINE EVENTOS</span>
                  <span className="text-[10px] text-yellow-500 animate-pulse">● EN VIVO</span>
                </span>
                <div className="flex-1 overflow-y-auto space-y-1.5 mt-2 scrollbar-thin">
                  {events.map((e, idx) => (
                    <div key={idx} className="p-1.5 border border-slate-800 bg-slate-950/60 rounded text-[10px] font-mono flex items-center justify-between">
                      <span className="text-slate-200"><span className="text-yellow-500 font-bold">[{e.tokenSymbol}]</span> {e.message}</span>
                      <span className="text-slate-500 text-[8px]">{e.minutesAgo}M atras</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* RIGHT ROW: Bubble Radar & Target Card */}
            <div className="col-span-3 flex flex-col gap-3 min-h-0">
              
              {/* Concentric Bubble Radar widget */}
              <div className="flex-1 min-h-0 bg-slate-900/30 border border-blue-900/20 rounded-xl p-3 flex flex-col justify-between">
                <span className="text-xs font-mono font-black text-slate-300 border-b border-slate-800 pb-1 block">RSI BUBBLE RADAR</span>
                
                <div className="flex-1 flex items-center justify-center relative my-2">
                  {/* Circular orbits indicators */}
                  <div className="absolute w-[160px] h-[160px] border border-blue-900/40 rounded-full flex items-center justify-center">
                    <div className="absolute w-[100px] h-[100px] border border-dashed border-yellow-500/25 rounded-full animate-spin"></div>
                  </div>

                  {/* Bubbles representation */}
                  <div className="relative w-full h-[180px] overflow-hidden flex items-center justify-center">
                    {tokens.map((t, index) => {
                      const angle = (index * (360 / tokens.length)) * Math.PI / 180;
                      const rad = 65;
                      const x = 75 + Math.cos(angle) * rad;
                      const y = 80 + Math.sin(angle) * rad;
                      const isS = t.id === selectedToken?.id;

                      return (
                        <div 
                          key={t.id}
                          onClick={() => { playSound('select', audioOn); setSelectedToken(t); }}
                          style={{ left: `${x}px`, top: `${y}px` }}
                          className={`absolute w-8 h-8 rounded-full border flex items-center justify-center font-mono text-[9px] font-black cursor-pointer transition-transform duration-200 hover:scale-110 ${isS ? 'border-yellow-500 bg-yellow-500/20 text-yellow-400' : 'border-slate-700 bg-slate-950 text-slate-300'}`}
                        >
                          {t.symbol.substring(0, 3)}
                        </div>
                      );
                    })}
                  </div>
                </div>

                <span className="text-[9px] font-mono text-center text-slate-500 uppercase block">CLIC EN BURBUJA PARA DISPARAR OBJETIVO 🎯</span>
              </div>

              {/* Highlight active card */}
              <div className="h-[140px] shrink-0 bg-slate-900/30 border border-blue-900/20 rounded-xl p-3 flex flex-col justify-between">
                <span className="text-xs font-mono font-black text-rose-500">SNIPER OBJETIVO</span>
                {selectedToken ? (
                  <div className="space-y-1">
                    <div className="flex justify-between items-baseline">
                      <span className="text-lg font-mono font-black text-slate-200">{selectedToken.symbol}</span>
                      <span className="text-xs text-yellow-500 font-mono font-bold">${selectedToken.price.toLocaleString(undefined, {maximumFractionDigits: selectedToken.decimals})}</span>
                    </div>
                    <div className="flex items-center justify-between text-xs font-mono">
                      <span className="text-slate-400">RSI: {selectedToken.rsi.toFixed(1)}</span>
                      <span className={selectedToken.priceChange24h >= 0 ? 'text-emerald-400' : 'text-rose-400'}>{selectedToken.priceChange24h >= 0 ? '+' : ''}{selectedToken.priceChange24h}% (24H)</span>
                    </div>
                  </div>
                ) : (
                  <span className="text-slate-500 text-xs font-mono block">Selecciones un activo</span>
                )}
                
                <a 
                  href={selectedToken ? `https://birdeye.so/token/${selectedToken.symbol}` : '#'} 
                  target="_blank" 
                  className="w-full text-center py-1 bg-yellow-500 text-slate-950 font-bold font-mono text-[11px] rounded"
                >
                  VER EN BIRDEYE
                </a>
              </div>

            </div>

          </main>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
